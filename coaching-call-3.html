  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"cd1a48f7-337a-48f8-b727-6ce60586424a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"ea42f04f-ce67-4b2f-9962-f7cd4613551a\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Saira Condensed';\n  font-style: normal;\n  font-weight: 900;\n  font-display: swap;\n  src: url(\"e4efc47d-8539-4450-829f-e40c77af6b6b\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>/* ============================================================\n   AIW · Coaching Call 1 — slide deck stylesheet\n   Reuses the AIW Course Cover visual language:\n   - Saira Condensed black italic for hero type\n   - JetBrains Mono for meta / eyebrow labels\n   - Faster One for accent numerals\n   - Cobalt-tinted dark cinematic background\n   - Chiseled numeral + star-sparkle motifs\n   ============================================================ */\n\n:root {\n  --hero: \"Saira Condensed\", \"Oswald\", \"Antonio\", system-ui, sans-serif;\n  --display: \"Saira Condensed\", \"Oswald\", system-ui, sans-serif;\n  --mono: \"JetBrains Mono\", ui-monospace, monospace;\n  --faster: \"Faster One\", \"Saira Condensed\", sans-serif;\n\n  /* Bolt palette — mostly black canvas, yellow used sparingly as a true accent.\n     accent-light is WHITE (becomes the default for most \"accent\" elements).\n     accent stays lightning-yellow but only shows up on a tiny handful of\n     deliberate moments — eyebrow dot, lightning-bolt icons, ONE em per slide. */\n  --bg-deep: #050505;\n  --bg-mid: #0d0d0d;\n  --accent: oklch(0.90 0.19 96);\n  --accent-light: #ffffff;\n  --accent-deep: oklch(0.74 0.19 92);\n  --halo: rgba(255,255,255,0.4);\n\n  --ink: #ffffff;\n  --ink-dim: oklch(0.82 0.006 80);\n  --ink-mute: oklch(0.58 0.008 80);\n  --ink-faint: oklch(0.40 0.008 80);\n\n  /* Rules — neutral, not yellow-tinted, so the canvas stays mono. */\n  --rule: oklch(0.22 0.005 80);\n}\n\n* { box-sizing: border-box; }\nem { font-style: normal; }\n\nhtml, body {\n  margin: 0;\n  padding: 0;\n  background: #000;\n  color: var(--ink);\n  font-family: var(--display);\n  -webkit-font-smoothing: antialiased;\n}\n\ndeck-stage { background: #000; }\n\n/* ============================================================\n   Slide chassis — every <section> is 1920×1080\n   ============================================================ */\n\n.slide {\n  position: relative;\n  width: 1920px;\n  height: 1080px;\n  overflow: hidden;\n  isolation: isolate;\n  color: var(--ink);\n  background:\n    radial-gradient(ellipse 70% 80% at 78% 50%,\n      #161616 0%,\n      #0a0a0a 55%,\n      #050505 92%),\n    #050505;\n}\n\n/* Variant backgrounds */\n.slide.bg-center {\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 60%,\n      #181818 0%,\n      #0c0c0c 50%,\n      #050505 92%),\n    #050505;\n}\n.slide.bg-bottom {\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 100%,\n      #141414 0%,\n      #050505 60%),\n    #050505;\n}\n.slide.bg-flat { background: #050505; }\n\n/* Shared chrome — vignette + grain + AIW mark + chrome corners */\n.slide .vignette {\n  position: absolute; inset: 0; z-index: 80; pointer-events: none;\n  background: radial-gradient(ellipse 100% 80% at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);\n}\n.slide .grain {\n  position: absolute; inset: 0; z-index: 81; pointer-events: none;\n  background-image: url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9  0 0 0 0 0.9  0 0 0 0 0.9  0 0 0 0.4 0'/><\u002Ffilter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.45'/><\u002Fsvg>\");\n  background-size: 240px 240px;\n  mix-blend-mode: overlay;\n  opacity: 0.08;\n}\n\n.slide .brand {\n  position: absolute;\n  top: 56px;\n  left: 80px;\n  z-index: 90;\n}\n.slide .brand img {\n  height: 64px;\n  width: auto;\n  display: block;\n  opacity: 1;\n}\n\n.slide .footer {\n  position: absolute;\n  bottom: 56px;\n  left: 80px;\n  right: 80px;\n  z-index: 90;\n  display: flex;\n  justify-content: space-between;\n  align-items: flex-end;\n  font-family: var(--mono);\n  font-size: 24px;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.slide .footer .left,\n.slide .footer .right { display: flex; align-items: center; gap: 14px; }\n.slide .footer .dot {\n  width: 7px; height: 7px; border-radius: 50%;\n  background: var(--accent-light);\n  box-shadow: 0 0 10px var(--accent);\n}\n\n/* ============================================================\n   Eyebrow / Meta labels\n   ============================================================ */\n.eyebrow {\n  display: inline-flex;\n  align-items: center;\n  gap: 14px;\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 500;\n  letter-spacing: 0.42em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n}\n.eyebrow .dot {\n  display: none;\n}\n\n/* ============================================================\n   Title classes\n   ============================================================ */\n.h-hero {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 360px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-shadow: 0 8px 40px rgba(0,0,0,0.6);\n}\n.h-display {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 180px;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n}\n.h-big {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 132px;\n  line-height: 1;\n  letter-spacing: -0.02em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-wrap: balance;\n}\n.h-med {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 96px;\n  line-height: 1;\n  letter-spacing: -0.015em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-wrap: balance;\n}\n.h-sm {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n}\n.sub {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 32px;\n  line-height: 1.3;\n  letter-spacing: 0.005em;\n  color: var(--ink-dim);\n  margin: 0;\n  text-wrap: pretty;\n}\n.lede {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 38px;\n  line-height: 1.3;\n  letter-spacing: 0.005em;\n  color: var(--ink-dim);\n  margin: 0;\n  max-width: 1100px;\n  text-wrap: pretty;\n}\n\n/* gradient accent words */\n.accent { color: var(--accent-light); }\n\n/* em.accent in big display headlines gets the signature welcome-chisel treatment */\n.h-hero em.accent,\n.h-display em.accent,\n.h-big em.accent,\n.h-med em.accent,\n.statement em.accent,\n.sus-card .q em.accent {\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 75%, #fff) 35%,\n    var(--accent) 70%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n  filter:\n    drop-shadow(2px 2px 0 color-mix(in oklch, var(--accent) 50%, #000))\n    drop-shadow(6px 6px 0 color-mix(in oklch, var(--accent) 35%, #000))\n    drop-shadow(12px 12px 0 color-mix(in oklch, var(--accent-deep) 50%, #000));\n}\n\n.accent-grad {\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 75%, #fff) 35%,\n    var(--accent) 70%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n}\n\n/* skew rule + star (matches WelcomeB) */\n.rule {\n  display: flex;\n  align-items: center;\n  gap: 24px;\n  color: var(--accent);\n}\n.rule span {\n  flex: 1;\n  height: 3px;\n  background: linear-gradient(90deg, transparent, currentColor 50%, transparent);\n  transform: skewX(-12deg);\n}\n.rule .star {\n  flex: 0 0 auto;\n  width: 52px;\n  height: 52px;\n  color: var(--accent-light);\n  filter: drop-shadow(0 0 14px color-mix(in oklch, var(--accent) 70%, transparent));\n}\n\n/* ============================================================\n   Layouts\n   ============================================================ */\n\n/* Center stack */\n.layout-center {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  padding: 180px 120px;\n  gap: 36px;\n  z-index: 10;\n  text-align: center;\n}\n\n/* Left content with right stage */\n.layout-split {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  grid-template-columns: 1.05fr 1fr;\n  z-index: 10;\n}\n.layout-split .left {\n  padding: 220px 80px 160px 220px;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  gap: 32px;\n}\n.layout-split .right {\n  position: relative;\n  padding: 220px 220px 160px 60px;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  gap: 28px;\n}\n\n/* Stack — full-width left-aligned */\n.layout-stack {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  padding: 220px 220px 180px 220px;\n  gap: 40px;\n  z-index: 10;\n}\n\n/* ============================================================\n   Star + chiseled numeral utilities\n   ============================================================ */\n\n.stars-bg {\n  position: absolute; inset: 0; width: 100%; height: 100%;\n  z-index: 1; pointer-events: none;\n  opacity: 0.7;\n  filter: drop-shadow(0 0 6px rgba(255,255,255,0.45));\n}\n\n.chisel {\n  font-family: var(--hero);\n  font-weight: 900;\n  letter-spacing: -0.04em;\n  line-height: 1;\n  display: inline-block;\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 75%, #fff) 35%,\n    var(--accent) 70%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n  filter:\n    drop-shadow(2px 2px 0 color-mix(in oklch, var(--accent) 50%, #000))\n    drop-shadow(6px 6px 0 color-mix(in oklch, var(--accent) 35%, #000))\n    drop-shadow(12px 12px 0 color-mix(in oklch, var(--accent-deep) 50%, #000));\n}\n\n/* Big ghost numeral, sits right side */\n.ghost-numeral {\n  position: absolute;\n  top: 50%;\n  right: -60px;\n  transform: translateY(-50%);\n  z-index: 2;\n  pointer-events: none;\n  user-select: none;\n}\n.ghost-numeral span {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 900px;\n  line-height: 0.78;\n  letter-spacing: -0.04em;\n  display: block;\n}\n\n/* ============================================================\n   Lists / Checklists / Steps\n   ============================================================ */\n\n.checklist {\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  margin: 0;\n  padding: 0;\n  list-style: none;\n  width: 100%;\n  max-width: 1200px;\n}\n.checklist li {\n  display: flex;\n  align-items: center;\n  gap: 28px;\n  padding: 22px 28px;\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 4%, transparent);\n  border-radius: 4px;\n}\n.checklist .ck-num {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.18em;\n  color: var(--accent-light);\n  min-width: 48px;\n}\n.checklist .ck-box {\n  width: 38px;\n  height: 38px;\n  border: 2px solid #050505;\n  border-radius: 4px;\n  flex-shrink: 0;\n  position: relative;\n  background: #ffffff;\n}\n.checklist .ck-label {\n  font-family: var(--display);\n  font-weight: 700;\n  font-size: 38px;\n  text-transform: uppercase;\n  letter-spacing: 0.01em;\n  color: var(--ink);\n  flex: 1;\n}\n\n/* Numbered list — large numeric */\n.steps {\n  display: flex;\n  flex-direction: column;\n  gap: 36px;\n  margin: 0;\n  padding: 0;\n  list-style: none;\n  width: 100%;\n}\n.steps li {\n  display: grid;\n  grid-template-columns: 140px 1fr;\n  gap: 32px;\n  align-items: center;\n  padding-bottom: 28px;\n  border-bottom: 1px solid var(--rule);\n}\n.steps .n {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 120px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    var(--accent-light) 50%,\n    var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.steps .body { display: flex; flex-direction: column; gap: 10px; }\n.steps .title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.steps .desc {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 26px;\n  line-height: 1.35;\n  color: var(--ink-dim);\n  letter-spacing: 0.005em;\n}\n\n/* ============================================================\n   Flow row — chevron-connected boxes\n   ============================================================ */\n\n.flow {\n  display: flex;\n  align-items: stretch;\n  gap: 0;\n  width: 100%;\n  flex-wrap: wrap;\n  justify-content: center;\n}\n.flow .node {\n  flex: 0 0 auto;\n  min-width: 220px;\n  padding: 28px 32px;\n  border: 1.5px solid var(--accent);\n  background: color-mix(in oklch, var(--accent) 10%, transparent);\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 32px;\n  letter-spacing: 0.005em;\n  color: #fff;\n  text-transform: uppercase;\n  text-align: center;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  transform: skewX(-8deg);\n}\n.flow .node > span { transform: skewX(8deg); display: inline-block; }\n.flow .arrow {\n  flex: 0 0 auto;\n  width: 56px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--accent-light);\n  font-family: var(--mono);\n  font-size: 36px;\n}\n.flow .node.bold {\n  background: color-mix(in oklch, var(--accent) 30%, transparent);\n  border-color: var(--accent-light);\n  box-shadow: 0 0 30px color-mix(in oklch, var(--accent) 40%, transparent);\n}\n\n/* Vertical flow — used on Journey */\n.flow-v {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  width: 100%;\n  max-width: 1400px;\n}\n.flow-v .row {\n  display: flex;\n  gap: 16px;\n  align-items: stretch;\n  flex-wrap: wrap;\n  justify-content: center;\n}\n\n/* ============================================================\n   Three pillars\n   ============================================================ */\n\n.pillars {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 32px;\n  width: 100%;\n  margin-top: 20px;\n}\n.pillar {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  padding: 56px 44px;\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  min-height: 480px;\n  position: relative;\n  overflow: hidden;\n}\n.pillar .p-num {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.pillar .p-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.pillar .p-desc {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n  margin-top: 12px;\n}\n.pillar .p-star {\n  position: absolute;\n  top: 44px;\n  right: 44px;\n  width: 48px;\n  height: 48px;\n  color: var(--accent-light);\n  opacity: 0.85;\n  filter: drop-shadow(0 0 14px color-mix(in oklch, var(--accent) 60%, transparent));\n}\n\n/* ============================================================\n   Calls schedule\n   ============================================================ */\n.cal-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 36px;\n  width: 100%;\n}\n.cal-day {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 6%, transparent);\n  padding: 48px 40px 40px;\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  text-align: center;\n  position: relative;\n}\n.cal-day .cal-dow {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.36em;\n  color: var(--accent-light);\n}\n.cal-day .cal-name {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 96px;\n  line-height: 1;\n  letter-spacing: -0.015em;\n  color: #fff;\n  text-transform: uppercase;\n}\n.cal-day .cal-time {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  padding-top: 20px;\n  border-top: 1px solid var(--rule);\n}\n.cal-day .cal-tz {\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--mono);\n  font-size: 26px;\n  color: var(--ink-dim);\n  letter-spacing: 0.08em;\n}\n.cal-day .cal-tz b {\n  color: var(--ink-mute);\n  font-weight: 500;\n  letter-spacing: 0.24em;\n  font-size: 24px;\n  text-transform: uppercase;\n  align-self: center;\n}\n\n/* ============================================================\n   Curriculum (5 weeks)\n   ============================================================ */\n.weeks {\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n  width: 100%;\n  border-top: 1px solid var(--rule);\n}\n.week-row {\n  display: grid;\n  grid-template-columns: 200px 280px 1fr;\n  gap: 40px;\n  padding: 28px 0;\n  align-items: center;\n  border-bottom: 1px solid var(--rule);\n}\n.week-row > .aiw-icon {\n  justify-self: center;\n}\n.week-row .w-n {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.week-row .w-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.week-row .w-topics {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n  letter-spacing: 0.005em;\n}\n\n/* ============================================================\n   Quote / Statement\n   ============================================================ */\n.statement {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 136px;\n  line-height: 1;\n  letter-spacing: -0.015em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-wrap: balance;\n}\n.statement em {\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 60%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n/* ============================================================\n   Tag / Pill\n   ============================================================ */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 14px;\n  padding: 16px 28px 16px 24px;\n  border: 1px solid color-mix(in oklch, var(--accent) 50%, transparent);\n  background: color-mix(in oklch, var(--accent) 12%, transparent);\n  border-radius: 999px;\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 500;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n}\n.pill .dot { display: none; }\n\n/* ============================================================\n   Section divider — big stamped section title\n   ============================================================ */\n.section-divider {\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 100%,\n      #141414 0%,\n      #050505 60%),\n    #050505;\n}\n.section-divider .sd-wrap {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 40px;\n  z-index: 10;\n  text-align: center;\n  padding: 0 120px;\n}\n.section-divider .sd-chapter {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: 0.6em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  display: inline-flex; align-items: center; gap: 18px;\n}\n.section-divider .sd-chapter .dot { display: none; }\n.section-divider .sd-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 280px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-shadow: 0 8px 40px rgba(0,0,0,0.6);\n}\n\n/* ============================================================\n   Cover (slide 1) — stamped WELCOME\n   ============================================================ */\n.cover-slide {\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 100%,\n      #141414 0%,\n      #050505 60%),\n    #050505;\n}\n.cover-slide .cv-wrap {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 18px;\n  z-index: 10;\n  text-align: center;\n  padding: 0 100px;\n}\n.cover-sl  }\n.goal-trio .gt:nth-child(3) { color: var(--ink-dim); }\n\n/* ============================================================\n   Truth pair\n   ============================================================ */\n.truth-pair {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 60px;\n  width: 100%;\n  margin-top: 20px;\n}\n.truth-pair .tp {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 6%, transparent);\n  padding: 64px 56px;\n  display: flex;\n  flex-direction: column;\n  gap: 24px;\n  min-height: 360px;\n}\n.truth-pair .tp .n {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 200px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 60%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.truth-pair .tp .t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 88px;\n  line-height: 0.95;\n  letter-spacing: -0.01em;\n  text-transform: uppercase;\n  color: #fff;\n  margin-top: auto;\n}\n\n/* ============================================================\n   Mindset bullet list\n   ============================================================ */\n.mindset {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n  margin: 0;\n  padding: 0;\n  list-style: none;\n  width: 100%;\n  max-width: 1280px;\n}\n.mindset li {\n  display: flex;\n  align-items: baseline;\n  gap: 24px;\n  padding-bottom: 24px;\n  border-bottom: 1px solid var(--rule);\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 42px;\n  line-height: 1.15;\n  letter-spacing: 0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.mindset li::before {\n  content: '✦';\n  color: var(--accent-light);\n  font-size: 24px;\n  flex-shrink: 0;\n  filter: drop-shadow(0 0 6px color-mix(in oklch, var(--accent) 80%, transparent));\n}\n.mindset li em {\n  color: var(--accent-light);\n}\n\n/* ========================= e: 64px;\n  color: var(--accent-light);\n}\n\n/* ============================================================\n   Faster One numeric (final slide)\n   ============================================================ */\n.faster-num {\n  font-family: var(--faster);\n  font-size: 280px;\n  line-height: 1;\n  color: var(--accent-light);\n  letter-spacing: -0.02em;\n  text-shadow: 0 6px 30px rgba(0,0,0,0.6);\n}\n\n/* ============================================================\n   Helpers\n   ============================================================ */\n.mute { color: var(--ink-mute); }\n.dim  { color: var(--ink-dim); }\n.acc  { color: var(--accent-light); }\n\n/* ============================================================\n   Title-card rails (slide 01, slide 06)\n   ============================================================ */\n.rail {\n  position: absolute;\n  left: 80px;\n  right: 80px;\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  gap: 28px;\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.rail-top { top: 68px; }\n.rail-bottom { bottom: 68px; }\n.rail .rail-line {\n  flex: 1;\n  height: 1px;\n  background: linear-gradient(90deg,\n    color-mix(in oklch, var(--ink-mute) 60%, transparent),\n    color-mix(in oklch, var(--accent) 60%, transparent),\n    color-mix(in oklch, var(--ink-mute) 60%, transparent));\n}\n\n/* ============================================================\n   Welcome hero (slide 01)\n   ============================================================ */\n.welcome-hero {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  align-items: center;\n  padding: 0 200px;\n  gap: 80px;\n  z-index: 10;\n}\n.welcome-stack {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n}\n.welcome-eyebrow {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: 0.42e er-spacing: 0.52em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n}\n.g2-headline {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 60px;\n}\n.g2-from {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 220px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  color: var(--ink-dim);\n  text-decoration-thickness: 6px;\n}\n.g2-to {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 280px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 80%, #fff) 40%,\n    var(--accent) 80%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  -webkit-text-stroke: 2px #fff;\n  paint-order: stroke fill;\n  filter: drop-shadow(0 0 30px color-mix(in oklch, var(--accent) 50%, transparent));\n}\n.g2-arrow {\n  width: 140px;\n  height: 70px;\n  flex: 0 0 auto;\n}\n.g2-per {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 48px;\n  line-height: 1;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n  margin-top: -8px;\n}\n\n.g2-divider {\n  display: flex;\n  align-items: center;\n  gap: 28px;\n  width: 100%;\n  max-width: 1100px;\n  margin-top: 24px;\n}\n.g2-divider span {\n  flex: 1;\n  height: 1px;\n  background: linear-gradient(90deg,\n    transparent,\n    color-mix(in oklch, var(--accent) 60%, var(--ink-mute)) 50%,\n    transparent);\n}\n.g2-divider em {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  font-style: normal;\n}\n\n.g2-trio {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 48px;\n  width: 100%;\n  max-width: 1500px;\n  margin-top: 8px;\n}\n.g2-pillar {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n  padding: 28px 12px;\n  borde 2px #fff;\n  paint-order: stroke fill;\n  filter: drop-shadow(0 0 32px color-mix(in oklch, var(--accent) 50%, transparent));\n}\n.goal-ladder .rung-meta {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 500;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.goal-ladder .rung-bridge {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: flex-end;\n  padding-bottom: 100px;\n  gap: 14px;\n}\n.goal-ladder .bridge-label {\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  white-space: nowrap;\n}\n.goal-ladder .bridge-svg {\n  width: 100%;\n  height: 60px;\n  display: block;\n}\n\n.goal-outcomes {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n}\n.goal-outcomes .oc-head {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 36px;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n}\n.goal-outcomes .oc-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 28px;\n}\n.oc-card {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  padding: 28px 32px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  position: relative;\n  overflow: hidden;\n}\n.oc-card::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 3px;\n  background: var(--accent-light);\n}\n.oc-card .oc-n {\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 700;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.oc-card .oc-t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.oc-card .oc-d {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.35;\n  color: var(--ink-dim);\n  margin-top: 4px;\n}\n\n/* ============================================================\n   Module rows (slide 23) — lesson-list style\n   ============================================================ */\n.modules {\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n  width: 100%;\n}\n.module-row {\n  display: grid;\n  grid-template-columns: 200px 1fr auto 80px;\n  gap: 40px;\n  align-items: center;\n  padding: 28px 40px 28px 32px;\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  text-decoration: none;\n  position: relative;\n  overflow: hidden;\n  transition: background .25s ease, border-color .25s ease;\n}\n.module-row::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 4px;\n  background: var(--accent-light);\n  box-shadow: 0 0 18px color-mix(in oklch, var(--accent) 70%, transparent);\n}\n.module-row .m-n {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 120px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 55%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n}\n.module-row .m-body {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n}\n.module-row .m-label {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  color: var(--accent-light);\n  text-transform: uppercase;\n}\n.module-row .m-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.module-row .m-meta {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 500;\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n}\n.module-row .m-cta {\n  width: 72px;\n  height: 72px;\n  border: 2px solid var(--accent);\n  background: color-mix(in oklch, var(--accent) 18%, transparent);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--accent-light);\n  box-shadow: 0 0 24px color-mix(in oklch, var(--accent) 30%, transparent);\n}\n.module-row .m-cta svg {\n  width: 28px;\n  height: 28px;\n  margin-left: 4px;\n}\n\n\n/* ============================================================\n   BOLT OVERRIDES\n   Big hero typography stays white. Yellow is reserved for small\n   accents: eyebrows, dots, dividers, sparkles, stars, in-headline\n   emphasis words, and a single yellow chisel offset behind big\n   numerals/stamped words.\n   ============================================================ */\n\n/* Cover slide — \"to AIW.\" stamped white, dark chisel only (no yellow outline) */\n.welcome-title .wt-line-2 {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  filter:\n    drop-shadow(3px 3px 0 #1f1f1f)\n    drop-shadow(9px 9px 0 #141414)\n    drop-shadow(16px 16px 0 #0a0a0a)\n    drop-shadow(22px 22px 26px rgba(0, 0, 0, 0.6));\n}\n.welcome-mark::before {\n  background: radial-gradient(circle at 50% 50%,\n    oklch(0.90 0.19 96 / 0.18) 0%,\n    oklch(0.90 0.19 96 / 0.08) 40%,\n    transparent 70%);\n}\n\n/* Section divider — flat white title */\n.section-divider .sd-title {\n  color: #ffffff;\n  text-shadow:\n    3px 3px 0 oklch(0.90 0.19 96 / 0.55),\n    0 8px 40px rgba(0,0,0,0.6);\n}\n\n/* In-headline emphasis words — flat yellow (small accent volume) */\n.h-hero em.accent,\n.h-display em.accent,\n.h-big em.accent,\n.h-med em.accent,\n.statement em.accent,\n.statement em,\n.sd-title em.accent,\n.sus-card .q em.accent {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: oklch(0.90 0.19 96);\n  color: oklch(0.90 0.19 96);\n  filter: none;\n}\n\n/* Subtitles — lightning yellow per teammate review */\n.sub {\n  color: oklch(0.90 0.19 96);\n}\n\n/* Set-Up answer cards (slides 20/21/22) — white, not yellow */\n.sus-card .a {\n  color: #ffffff;\n}\n\n/* Large numerals (steps, module rows, truth pair, sus q-mark)\n   → pure white with a single yellow chisel offset for character */\n.steps .n,\n.module-row .m-n,\n.truth-pair .tp .n,\n.sus-card .q-mark,\n.accent-grad {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  text-shadow:\n    4px 4px 0 oklch(0.90 0.19 96 / 0.55),\n    0 4px 12px rgba(0, 0, 0, 0.5);\n}\n\n/* \"Sell.\" \"Multiply.\" stamped words on slide 16 → white, dark chisel only */\n.chisel {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  filter:\n    drop-shadow(4px 4px 0 #1f1f1f)\n    drop-shadow(10px 10px 0 #141414)\n    drop-shadow(18px 18px 0 #0a0a0a);\n}\n\n/* $5 / $15 / $1 cohort stats — override the inline gradient to white + yellow shadow.\n   Inline styles override class rules, but text-fill is set on the inline. We use a\n   selector specific enough to win without !important by setting the gradient to none. */\n.layout-center [style*=\"background:linear-gradient\"][style*=\"-webkit-background-clip\"] {\n  /* fall-through — kept for any inline gradient bits, they'll go yellow which is fine */\n}\n\n/* Calendar day names — pure white */\n.cal-day .cal-name { color: #ffffff; }\n\n/* Faster One numeric (if used) — white with yellow glow */\n.faster-num {\n  color: #ffffff;\n  text-shadow:\n    3px 3px 0 oklch(0.90 0.19 96 / 0.5),\n    0 6px 30px rgba(0,0,0,0.6);\n}\n\n/* Star sparkles — yellow halo */\n.stars-bg {\n  filter: drop-shadow(0 0 6px oklch(0.90 0.19 96 / 0.6));\n}\n\n/* Goal slide — $100K becomes white with a single yellow chisel kiss */\n.g2-to {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  -webkit-text-stroke: 0;\n  filter:\n    drop-shadow(4px 4px 0 oklch(0.90 0.19 96))\n    drop-shadow(10px 10px 0 #181818)\n    drop-shadow(18px 18px 0 #0e0e0e)\n    drop-shadow(24px 24px 30px rgba(0, 0, 0, 0.6));\n}\n.g2-from { color: oklch(0.55 0.008 80); }\n\n/* Cards / boxes — strip the (now-yellow) accent tint from large surfaces,\n   leave only thin yellow edges and small chips */\n.checklist li,\n.pillar,\n.cal-day,\n.weeks .week-row,\n.vf-step,\n.truth-pair .tp,\n.oc-card,\n.module-row {\n  background: rgba(255, 255, 255, 0.02);\n}\n.flow .node {\n  background: rgba(255, 255, 255, 0.03);\n  border-color: oklch(0.30 0.005 80);\n}\n.flow .node.bold {\n  background: oklch(0.90 0.19 96 / 0.14);\n  border-color: oklch(0.90 0.19 96);\n  box-shadow: 0 0 30px oklch(0.90 0.19 96 / 0.30);\n}\n.versus .col.new {\n  background: oklch(0.90 0.19 96 / 0.10);\n}\n.pill {\n  background: oklch(0.90 0.19 96 / 0.08);\n  border-color: oklch(0.90 0.19 96 / 0.45);\n}\n.module-row .m-cta {\n  background: oklch(0.90 0.19 96 / 0.14);\n}\n\n/* Vision flow arrow background — match the new neutral card */\n.vision-flow .arr {\n  background: #050505;\n}\n\n/* Mindset bullets star — already accent-light (yellow) ✓ */\n/* Pillar stars — already accent-light (yellow) ✓ */\n\n/* \"We're really after\" rule line on goal slide */\n.g2-divider span {\n  background: linear-gradient(90deg,\n    transparent,\n    oklch(0.90 0.19 96 / 0.65) 50%,\n    transparent);\n}\n\n/* Rail lines on cover slide */\n.rail .rail-line {\n  background: linear-gradient(90deg,\n    color-mix(in oklch, var(--ink-mute) 60%, transparent),\n    oklch(0.90 0.19 96 / 0.55),\n    color-mix(in oklch, var(--ink-mute) 60%, transparent));\n}\n\n/* Goal headline arrow svg — repaint stroke + fill yellow */\n.g2-arrow line { stroke: oklch(0.90 0.19 96) !important; }\n.g2-arrow path { fill:   oklch(0.90 0.19 96) !important; }\n\n/* The arrow → on Set-Up slides (inline color) — already var(--accent-light) ✓ */\n\n/* Pillar accent border-left on .oc-card and .module-row remains yellow ✓ */\n\n\n/* ============================================================\n   YELLOW REDUCTION PASS — 80% less yellow.\n   accent-light = white now. This block clears the remaining yellow\n   that comes from color-mix backgrounds and direct accent uses on\n   large surfaces, leaving yellow only on truly small accents:\n   - eyebrow dot\n   - .bolt-icon (lightning bolt SVG)\n   - .sub subtitle accent line\n   - one em.accent kiss per slide\n   ============================================================ */\n\n/* Strip yellow from card backgrounds */\n.checklist li,\n.pillar,\n.cal-day,\n.weeks .week-row,\n.vf-step,\n.truth-pair .tp,\n.oc-card,\n.module-row,\n.sus-card {\n  background: rgba(255,255,255,0.025) !important;\n  border-color: oklch(0.20 0.005 80) !important;\n}\n.oc-card::before,\n.module-row::before {\n  background: rgba(255,255,255,0.5) !important;\n  box-shadow: none !important;\n}\n\n/* Pills become subtle white */\n.pill {\n  background: rgba(255,255,255,0.05) !important;\n  border-color: rgba(255,255,255,0.18) !important;\n  color: var(--ink-dim) !important;\n}\n.pill .dot {\n  background: rgba(255,255,255,0.4) !important;\n}\n\n/* Rules/dividers become subtle white */\n.statement .stmt-rule,\n.g2-divider span,\n.h-pad {\n  background: linear-gradient(90deg,\n    transparent,\n    rgba(255,255,255,0.18) 50%,\n    transparent) !important;\n}\n\n/* Module row CTA — subtle, not yellow */\n.module-row .m-cta {\n  background: rgba(255,255,255,0.06) !important;\n  border-color: rgba(255,255,255,0.25) !important;\n  box-shadow: none !important;\n  color: #ffffff !important;\n}\n\n/* Flow node \"bold\" — subtle highlight, no yellow halo */\n.flow .node.bold {\n  background: rgba(255,255,255,0.06) !important;\n  border-color: rgba(255,255,255,0.3) !important;\n  box-shadow: none !important;\n}\n.versus .col.new {\n  background: rgba(255,255,255,0.04) !important;\n}\n\n/* Strip yellow from stars/sparkle filters */\n.stars-bg {\n  filter: drop-shadow(0 0 4px rgba(255,255,255,0.35)) !important;\n}\n\n/* Reduce yellow drop-shadow chisel on big numerals to dark-only */\n.steps .n,\n.module-row .m-n,\n.truth-pair .tp .n,\n.sus-card .q-mark,\n.accent-grad {\n  text-shadow:\n    3px 3px 0 #1a1a1a,\n    0 4px 12px rgba(0, 0, 0, 0.5) !important;\n}\n\n/* Goal hero $100K — dark chisel only */\n.g2-to {\n  filter:\n    drop-shadow(3px 3px 0 #1a1a1a)\n    drop-shadow(9px 9px 0 #0e0e0e)\n    drop-shadow(16px 16px 0 #050505)\n    drop-shadow(22px 22px 26px rgba(0, 0, 0, 0.6)) !important;\n}\n\n/* Subtitles: white with subtle yellow underline mark via ::before bolt */\n.sub {\n  color: var(--ink-dim) !important;\n}\n\n/* em.accent words — default to white. One designated per slide can re-yellow with .em-bolt */\n.h-hero em.accent,\n.h-display em.accent,\n.h-big em.accent,\n.h-med em.accent,\n.statement em.accent,\n.statement em,\n.sd-title em.accent,\n.sus-card .q em.accent,\n.gigo-quote em,\n.welcome-title em,\n.cc2-sub em {\n  color: #ffffff !important;\n  -webkit-text-fill-color: #ffffff !important;\n}\n\n/* Yellow-emphasis variant: only one or two per deck */\nem.em-bolt,\n.h-hero em.em-bolt,\n.h-big em.em-bolt,\n.statement em.em-bolt {\n  color: oklch(0.90 0.19 96) !important;\n  -webkit-text-fill-color: oklch(0.90 0.19 96) !important;\n}\n\n/* ============================================================\n   LIGHTNING BOLT ICON — the small intentional yellow accent\n   ============================================================ */\n.bolt-icon {\n  display: inline-block;\n  width: 1em;\n  height: 1.2em;\n  vertical-align: -0.2em;\n  color: oklch(0.90 0.19 96);\n  filter: drop-shadow(0 0 12px oklch(0.90 0.19 96 / 0.55));\n}\n.bolt-icon svg { width: 100%; height: 100%; display: block; }\n\n/* Inline bolt sized for eyebrow */\n.eyebrow .bolt-icon {\n  width: 22px; height: 28px;\n  margin-right: 2px;\n}\n\n/* ============================================================\n   MOTIF BACKGROUND LAYER\n   Big ghosted glyphs / words behind slide content, à la AIW cover system\n   ============================================================ */\n.slide-motif {\n  position: absolute;\n  inset: 0;\n  z-index: 1;\n  pointer-events: none;\n  overflow: hidden;\n  color: #ffffff;\n}\n\n/* Motif: scattered question marks */\n.slide-motif.motif-qmark {\n  display: block;\n}\n.slide-motif.motif-qmark .qm {\n  position: absolute;\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  line-height: 0.85;\n  color: #ffffff;\n  opacity: 0.05;\n  user-select: none;\n}\n\n/* Motif: diagonal stripe words (build / proof / repeat etc) */\n.slide-motif.motif-stripes {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.slide-motif.motif-stripes .ms-track {\n  position: absolute;\n  inset: -200px;\n  display: flex;\n  flex-direction: column;\n  gap: 30px;\n  transform: rotate(-22deg);\n  opacity: 0.04;\n}\n.slide-motif.motif-stripes .ms-row {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  font-size: 140px;\n  line-height: 1;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n  color: #ffffff;\n}\n\n/* Motif: scattered bolt glyphs */\n.slide-motif.motif-bolts {\n  display: block;\n}\n.slide-motif.motif-bolts .mb {\n  position: absolute;\n  opacity: 0.08;\n  color: #ffffff;\n}\n.slide-motif.motif-bolts .mb svg {\n  width: 100%; height: 100%; display: block;\n}\n\n/* Motif: numbered grid (01 02 03 ...) — for step/process slides */\n.slide-motif.motif-nums {\n  display: block;\n}\n.slide-motif.motif-nums .mn {\n  position: absolute;\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  font-size: 280px;\n  line-height: 0.85;\n  letter-spacing: -0.03em;\n  color: #ffffff;\n  opacity: 0.04;\n  user-select: none;\n}\n\n/* Motif: checkbox grid (for homework) */\n.slide-motif.motif-check {\n  display: block;\n}\n.slide-motif.motif-check .mc {\n  position: absolute;\n  width: 60px; height: 60px;\n  border: 3px solid #ffffff;\n  border-radius: 8px;\n  opacity: 0.05;\n}\n\n/* Motif: terminal-cursor lines (for code/factory) */\n.slide-motif.motif-term {\n  display: block;\n  font-family: var(--mono);\n}\n.slide-motif.motif-term .mt {\n  position: absolute;\n  font-size: 28px;\n  letter-spacing: 0.02em;\n  color: #ffffff;\n  opacity: 0.06;\n  white-space: nowrap;\n}\n\n/* Motif: calendar grid (for week slides) */\n.slide-motif.motif-cal {\n  display: block;\n}\n.slide-motif.motif-cal .mday {\n  position: absolute;\n  width: 180px; height: 180px;\n  border: 1px solid rgba(255,255,255,0.08);\n  opacity: 0.7;\n}\n\n/* Make sure slide content sits above motif */\n.slide > .layout-stack,\n.slide > .layout-center,\n.slide > .step-stage {\n  z-index: 6;\n}\n.slide > .stars-bg { z-index: 2; }\n.slide > .vignette { z-index: 7; }\n.slide > .grain { z-index: 8; }\n\n\n/* ============================================================\n   AIW ICON SYSTEM — pulled from the cover-icon set\n   Italic slant, solid fill, AIW sparkle DNA\n   ============================================================ */\n\n.aiw-icon {\n  display: inline-block;\n  width: 1em;\n  height: 1em;\n  vertical-align: middle;\n  color: #ffffff;\n  transform: skew(-10deg);\n  flex-shrink: 0;\n}\n.aiw-icon svg { width: 100%; height: 100%; display: block; }\n\n/* Standard sizes */\n.aiw-icon.sm  { width: 32px; height: 32px; }\n.aiw-icon.md  { width: 56px; height: 56px; }\n.aiw-icon.lg  { width: 96px; height: 96px; }\n.aiw-icon.xl  { width: 144px; height: 144px; }\n\n/* Yellow variant — use SPARINGLY, max one per slide */\n.aiw-icon.bolt { color: oklch(0.90 0.19 96); }\n\n/* Icon tile — for grids of icons (like the schedule, modules, machine nodes) */\n.icon-tile {\n  display: flex;\n  flex-direction: column;\n  align-items: flex-start;\n  gap: 18px;\n  padding: 32px;\n  border: 1px solid var(--rule);\n  background: rgba(255,255,255,0.025);\n  position: relative;\n}\n.icon-tile .aiw-icon {\n  width: 80px;\n  height: 80px;\n}\n.icon-tile .it-label {\n  font-family: var(--mono);\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.icon-tile .it-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 44px;\n  line-height: 0.95;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #ffffff;\n}\n.icon-tile .it-desc {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 22px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n  margin-top: auto;\n}\n\n/* Even less yellow — make eyebrow dots white by default.\n   Slides that want the yellow can override per-instance. */\n.eyebrow .dot {\n  background: #ffffff !important;\n  box-shadow: 0 0 8px rgba(255,255,255,0.5) !important;\n}\n.eyebrow {\n  color: rgba(255,255,255,0.85) !important;\n}\n\n/* Steps/columns: when icons replace the numerals, swap the chisel for clean white */\n.icon-step {\n  display: flex;\n  flex-direction: column;\n  align-items: flex-start;\n  gap: 16px;\n}\n.icon-step .aiw-icon {\n  width: 96px;\n  height: 96px;\n  margin-bottom: 8px;\n}\n.icon-step .is-n {\n  font-family: var(--mono);\n  font-size: 20px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  color: var(--ink-mute);\n}\n.icon-step .is-t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 38px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #ffffff;\n}\n.icon-step .is-d {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 22px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n}\n\n\n/* ============================================================\n   DECK COVER STRIPES — diagonal repeating-word motif\n   à la the AIW live-call covers (WORKSHOP / Q&A / VALUE)\n   ============================================================ */\n.cover-stripes {\n  position: absolute;\n  inset: -200px;\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n  transform: rotate(-22deg);\n  opacity: 0.06;\n  z-index: 1;\n  pointer-events: none;\n  user-select: none;\n  overflow: hidden;\n}\n.cover-stripes .cs-row {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  font-size: 160px;\n  line-height: 1;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n  color: #ffffff;\n}\n.cover-stripes .cs-row.dim {\n  opacity: 0.6;\n}\n\n\n/* Override: ensure pillar stars + gigo bullets are pure white, no yellow glow */\n.pillar .p-star {\n  color: #ffffff !important;\n  filter: none !important;\n  opacity: 1 !important;\n}\n.gigo-body ul li::before {\n  color: #ffffff !important;\n}\n<\u002Fstyle>\n\n<style>\n  /* ============================================================\n     Coaching Call 3 — slide-specific layouts\n     ============================================================ */\n\n  /* Two-column callout grid (slide 02, 13, 17) */\n  .two-up {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 56px;\n    width: 100%;\n  }\n  .callout {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 48px 44px;\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    min-height: 320px;\n  }\n  .callout.bolt {\n    background: oklch(0.90 0.19 96 / 0.07);\n    border-color: oklch(0.90 0.19 96 / 0.45);\n  }\n  .callout .co-label {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .callout .co-h {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 52px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n  }\n  .callout .co-body {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.45;\n    color: var(--ink-dim);\n    margin: 0;\n  }\n  .callout ul {\n    margin: 0; padding: 0; list-style: none;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .callout ul li {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 24px;\n    line-height: 1.4;\n    color: #ffffff;\n    padding-left: 24px;\n    position: relative;\n  }\n  .callout ul li::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 12px;\n    width: 14px; height: 3px;\n    background: #ffffff;\n  }\n\n  /* Image slot — the finished website mock */\n  .image-slot {\n    border: 1px solid var(--rule);\n    background:\n      repeating-linear-gradient(135deg,\n        rgba(255,255,255,0.025) 0px,\n        rgba(255,255,255,0.025) 18px,\n        transparent 18px,\n        transparent 36px),\n      rgba(255,255,255,0.015);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    position: relative;\n  }\n  .image-slot .is-label {\n    font-family: var(--mono);\n    font-size: 26px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    text-align: center;\n    line-height: 1.6;\n  }\n  .image-slot .is-label b {\n    color: var(--accent);\n    font-weight: 500;\n    display: block;\n    margin-bottom: 6px;\n  }\n  .image-slot .is-corner {\n    position: absolute;\n    width: 22px; height: 22px;\n    border-color: oklch(0.90 0.19 96 / 0.5);\n    border-style: solid;\n    border-width: 0;\n  }\n  .image-slot .is-c-tl { top:0; left:0;   border-top-width: 2px; border-left-width: 2px; }\n  .image-slot .is-c-tr { top:0; right:0;  border-top-width: 2px; border-right-width: 2px; }\n  .image-slot .is-c-bl { bottom:0; left:0;border-bottom-width: 2px; border-left-width: 2px; }\n  .image-slot .is-c-br { bottom:0; right:0;border-bottom-width: 2px; border-right-width: 2px; }\n\n  /* Mini-flow with numbered chevrons (slide 04) */\n  .mini-flow {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 28px;\n    width: 100%;\n  }\n  .mini-flow .mf {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 36px 32px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    position: relative;\n    min-height: 260px;\n  }\n  .mini-flow .mf .mf-n {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 88px;\n    line-height: 0.9;\n    color: #ffffff;\n  }\n  .mini-flow .mf .mf-t {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 38px;\n    line-height: 1;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin-top: 4px;\n  }\n  .mini-flow .mf .mf-d {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    margin-top: auto;\n  }\n  .mini-flow .mf::after {\n    content: '→';\n    position: absolute;\n    right: -22px;\n    top: 50%;\n    transform: translateY(-50%);\n    font-family: var(--mono);\n    font-size: 36px;\n    color: #ffffff;\n    background: #050505;\n    padding: 0 4px;\n    z-index: 2;\n  }\n  .mini-flow .mf:last-child::after { display: none; }\n\n  /* Big background-numeral for steps that use stack/center layouts */\n  .step-ghost {\n    position: absolute;\n    top: 80px;\n    right: 100px;\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 360px;\n    line-height: 0.85;\n    letter-spacing: -0.04em;\n    color: #ffffff;\n    opacity: 0.10;\n    user-select: none;\n    pointer-events: none;\n    z-index: 1;\n  }\n  .step-ghost.bottom-left {\n    top: auto;\n    right: auto;\n    bottom: 80px;\n    left: 100px;\n  }\n\n  /* Big stage step (slides 07-11) */\n  .step-stage {\n    position: absolute;\n    inset: 0;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    z-index: 10;\n  }\n  .step-stage .ss-left {\n    padding: 200px 80px 160px 200px;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    gap: 32px;\n  }\n  .step-stage .ss-right {\n    padding: 200px 200px 160px 60px;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    gap: 24px;\n  }\n  .step-stage .ss-numeral {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 240px;\n    line-height: 0.85;\n    letter-spacing: -0.04em;\n    color: #ffffff;\n    text-shadow:\n      4px 4px 0 oklch(0.90 0.19 96 / 0.55),\n      0 6px 24px rgba(0,0,0,0.55);\n  }\n  .step-stage .ss-kicker {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .step-stage .ss-title {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 96px;\n    line-height: 0.95;\n    letter-spacing: -0.015em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n    text-wrap: balance;\n  }\n  .step-stage .ss-desc {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 26px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    max-width: 640px;\n  }\n  .step-stage .ss-list {\n    margin: 0; padding: 0; list-style: none;\n    display: flex; flex-direction: column;\n    gap: 0;\n    border-top: 1px solid var(--rule);\n  }\n  .step-stage .ss-list li {\n    padding: 22px 0;\n    border-bottom: 1px solid var(--rule);\n    font-family: var(--display);\n    font-weight: 600;\n    font-style: italic;\n    font-size: 30px;\n    letter-spacing: 0.005em;\n    color: #ffffff;\n    text-transform: uppercase;\n    display: flex;\n    align-items: baseline;\n    gap: 22px;\n  }\n  .step-stage .ss-list li::before {\n    content: '✦';\n    color: var(--accent);\n    font-size: 20px;\n    font-style: normal;\n  }\n  .step-stage .ss-list-label {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.4em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 6px;\n  }\n\n  /* Pipeline strip — slide 10 */\n  .pipeline {\n    display: flex;\n    width: 100%;\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n  }\n  .pipeline .pp {\n    flex: 1;\n    padding: 28px 22px;\n    border-right: 1px solid var(--rule);\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    text-align: center;\n  }\n  .pipeline .pp:last-child { border-right: none; }\n  .pipeline .pp .pp-n {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.32em;\n    color: var(--accent);\n  }\n  .pipeline .pp .pp-t {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 42px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .pipeline .pp.head {\n    background: oklch(0.90 0.19 96 / 0.10);\n    border-right-color: oklch(0.90 0.19 96 / 0.45);\n  }\n  .pipeline .pp.head .pp-t { color: oklch(0.90 0.19 96); }\n\n  /* Whole machine — 5 chained nodes */\n  .machine {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 18px;\n    width: 100%;\n  }\n  .machine .mc {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 36px 24px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    text-align: center;\n    align-items: center;\n    justify-content: flex-start;\n    min-height: 280px;\n    position: relative;\n  }\n  .machine .mc .mc-star {\n    width: 36px; height: 36px;\n    color: var(--accent);\n    align-self: center;\n    margin-bottom: 4px;\n  }\n  .machine .mc .mc-t {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 40px;\n    line-height: 1;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .machine .mc .mc-d {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    margin-top: auto;\n  }\n  .machine .mc::after {\n    content: '→';\n    position: absolute;\n    right: -16px;\n    top: 50%;\n    transform: translateY(-50%);\n    font-family: var(--mono);\n    font-size: 24px;\n    color: #ffffff;\n    background: #050505;\n    padding: 0 4px;\n    z-index: 2;\n  }\n  .machine .mc:last-child::after { display: none; }\n\n  /* Big quote — slide 14, 17 */\n  .big-quote {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 196px;\n    line-height: 0.95;\n    letter-spacing: -0.025em;\n    color: #ffffff;\n    margin: 0;\n    text-wrap: balance;\n    text-shadow:\n      4px 4px 0 oklch(0.90 0.19 96 / 0.45),\n      0 6px 22px rgba(0,0,0,0.55);\n  }\n  .quote-mark {\n    font-family: \"Cormorant Garamond\", Georgia, serif;\n    font-style: italic;\n    font-weight: 600;\n    font-size: 240px;\n    line-height: 0.5;\n    color: var(--accent);\n    opacity: 0.18;\n    user-select: none;\n    pointer-events: none;\n    margin-bottom: 0;\n  }\n\n  /* Garbage-in card */\n  .gigo {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 60px;\n    width: 100%;\n    align-items: center;\n  }\n  .gigo-quote {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 120px;\n    line-height: 0.95;\n    letter-spacing: -0.02em;\n    color: #ffffff;\n    text-transform: uppercase;\n    text-wrap: balance;\n  }\n  .gigo-quote em {\n    color: var(--accent);\n    font-style: italic;\n  }\n  .gigo-body {\n    display: flex;\n    flex-direction: column;\n    gap: 22px;\n  }\n  .gigo-body .gg-lede {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 28px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n  }\n  .gigo-body ul {\n    margin: 0; padding: 0; list-style: none;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .gigo-body ul li {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 28px;\n    line-height: 1.35;\n    color: #ffffff;\n    padding-left: 28px;\n    position: relative;\n  }\n  .gigo-body ul li::before {\n    content: '✦';\n    position: absolute;\n    left: 0; top: 2px;\n    color: #ffffff;\n    font-size: 24px;\n  }\n\n  /* Homework checklist — slide 19 */\n  .hw-list {\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    margin: 0; padding: 0; list-style: none;\n    width: 100%;\n    max-width: 1400px;\n  }\n  .hw-list li {\n    display: flex;\n    align-items: flex-start;\n    gap: 28px;\n    padding: 26px 32px;\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n  }\n  .hw-list .hw-n {\n    font-family: var(--mono);\n    font-size: 28px;\n    font-weight: 700;\n    letter-spacing: 0.32em;\n    color: #ffffff;\n    min-width: 56px;\n    flex-shrink: 0;\n    margin-top: 4px;\n  }\n  .hw-list .hw-box {\n    width: 38px; height: 38px;\n    border: 2px solid #050505;\n    background: #ffffff;\n    border-radius: 4px;\n    flex-shrink: 0;\n    margin-top: 4px;\n  }\n  .hw-list .hw-text {\n    font-family: var(--display);\n    font-weight: 600;\n    font-size: 28px;\n    line-height: 1.35;\n    color: #ffffff;\n  }\n  .hw-list .hw-text b {\n    color: var(--accent);\n    font-weight: 700;\n  }\n\n  /* Week 2 schedule cards — like cal-grid but with day labels */\n  .w2-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 28px;\n    width: 100%;\n  }\n  .w2-card {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 40px 36px;\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    min-height: 460px;\n  }\n  .w2-card .w2-dow {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .w2-card .w2-name {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 64px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .w2-card .w2-body {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.45;\n    color: var(--ink-dim);\n    margin-top: 6px;\n    text-wrap: pretty;\n  }\n\n  /* 5-week roadmap — slide 18 */\n  .weeks {\n    display: flex;\n    flex-direction: column;\n    width: 100%;\n    border-top: 1px solid var(--rule);\n  }\n  .week-row {\n    display: grid;\n    align-items: center;\n    column-gap: 36px;\n    padding: 22px 0;\n    border-bottom: 1px solid var(--rule);\n  }\n  .week-row .aiw-icon {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .week-row .aiw-icon svg {\n    width: 100%;\n    height: 100%;\n    display: block;\n  }\n  .week-row .w-n {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n  .week-row .w-title {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 54px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .week-row .w-title em {\n    font-style: italic;\n    color: var(--accent);\n  }\n  .week-row .w-topics {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    text-wrap: pretty;\n  }\n  .week-row .w-topics .topic-sep {\n    display: inline-block;\n    margin: 0 10px;\n    color: var(--accent);\n    font-weight: 700;\n  }\n\n  /* \"Can't do\" callout strip */\n  .cant-do {\n    margin-top: 28px;\n    padding: 28px 36px;\n    border-left: 4px solid var(--accent);\n    background: rgba(255,255,255,0.02);\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.45;\n    color: var(--ink-dim);\n    max-width: 1500px;\n  }\n  .cant-do b {\n    color: #ffffff;\n    font-weight: 800;\n    text-transform: uppercase;\n    letter-spacing: 0.01em;\n  }\n\n  /* Cover variant for this deck */\n  .cc2-cover {\n    background:\n      radial-gradient(ellipse 80% 60% at 50% 100%, #141414 0%, #050505 60%),\n      #050505;\n  }\n  .cc2-hero {\n    position: absolute;\n    inset: 0;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    gap: 22px;\n    z-index: 10;\n    padding: 0 120px;\n    text-align: center;\n  }\n  .cc2-tag {\n    font-family: var(--mono);\n    font-size: 26px;\n    font-weight: 600;\n    letter-spacing: 0.52em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .cc2-title {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: normal;\n    font-size: 320px;\n    line-height: 0.88;\n    letter-spacing: -0.025em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n    text-shadow:\n      4px 4px 0 #1c1c1c,\n      10px 10px 0 #121212,\n      18px 18px 0 #080808,\n      0 6px 30px rgba(0,0,0,0.6);\n  }\n  .cc2-sub {\n    font-family: var(--display);\n    font-weight: 500;\n    font-style: normal;\n    font-size: 36px;\n    letter-spacing: 0.005em;\n    color: #ffffff;\n    margin-top: 16px;\n    max-width: 1300px;\n    text-wrap: balance;\n  }\n  .cc2-foot {\n    position: absolute;\n    bottom: 80px;\n    left: 0; right: 0;\n    z-index: 10;\n    display: flex;\n    justify-content: center;\n    gap: 24px;\n    font-family: var(--mono);\n    font-size: 26px;\n    font-weight: 500;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n  .cc2-foot span.sep { color: var(--accent); }\n  /* Simple clickable URL — slide 03 */\n  .site-link {\n    display: inline-flex;\n    align-items: center;\n    gap: 22px;\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 96px;\n    line-height: 1;\n    letter-spacing: -0.01em;\n    color: oklch(0.90 0.19 96);\n    text-decoration: underline;\n    text-decoration-thickness: 4px;\n    text-underline-offset: 16px;\n    text-transform: lowercase;\n    align-self: flex-start;\n    transition: opacity .2s ease;\n  }\n  .site-link:hover { opacity: 0.85; }\n  .site-link svg {\n    width: 64px;\n    height: 64px;\n    display: block;\n    flex-shrink: 0;\n  }\n\n  /* Browser-window-style live site preview (slide 03) */\n  .site-preview {\n    display: flex;\n    flex-direction: column;\n    width: 100%;\n    height: 460px;\n    border: 1px solid var(--rule);\n    background: #0a0a0a;\n    overflow: hidden;\n    text-decoration: none;\n    color: inherit;\n    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;\n    position: relative;\n    box-shadow: 0 30px 80px rgba(0,0,0,0.5);\n  }\n  .site-preview:hover {\n    border-color: oklch(0.90 0.19 96 / 0.8);\n    transform: translateY(-3px);\n    box-shadow: 0 36px 90px rgba(0,0,0,0.65), 0 0 0 1px oklch(0.90 0.19 96 / 0.4);\n  }\n  .site-preview .sp-chrome {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    padding: 14px 22px;\n    background: #141414;\n    border-bottom: 1px solid var(--rule);\n    flex-shrink: 0;\n  }\n  .site-preview .sp-dots {\n    display: flex;\n    gap: 8px;\n  }\n  .site-preview .sp-dot {\n    width: 13px;\n    height: 13px;\n    border-radius: 50%;\n    background: #2a2a2a;\n  }\n  .site-preview .sp-url {\n    flex: 1;\n    padding: 9px 18px;\n    background: #050505;\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 500;\n    letter-spacing: 0.02em;\n    color: #ffffff;\n    text-align: center;\n    text-transform: lowercase;\n  }\n  .site-preview .sp-url b {\n    color: var(--accent);\n    font-weight: 500;\n  }\n  .site-preview .sp-open {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 18px;\n    background: oklch(0.90 0.19 96);\n    color: #050505;\n    border-radius: 999px;\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    white-space: nowrap;\n    flex-shrink: 0;\n  }\n  .site-preview .sp-open svg {\n    width: 16px; height: 16px;\n    display: block;\n  }\n  /* Mocked site hero — stylized representation of the live site */\n  .site-preview .sp-body {\n    flex: 1;\n    position: relative;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    padding: 50px 60px;\n    background:\n      radial-gradient(ellipse 60% 70% at 25% 100%,\n        rgba(255,255,255,0.04) 0%,\n        transparent 70%),\n      #0a0a0a;\n    overflow: hidden;\n  }\n  .site-preview .sp-mock {\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    align-items: flex-start;\n    max-width: 60%;\n    z-index: 2;\n  }\n  .site-preview .sp-eyebrow {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: oklch(0.90 0.19 96);\n  }\n  .site-preview .sp-h {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 62px;\n    line-height: 0.95;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n  }\n  .site-preview .sp-sub {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.4;\n    color: rgba(255,255,255,0.7);\n    margin: 0;\n    max-width: 460px;\n  }\n  .site-preview .sp-btn {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 12px 22px;\n    background: rgba(255,255,255,0.06);\n    border: 1px solid rgba(255,255,255,0.2);\n    border-radius: 4px;\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 24px;\n    letter-spacing: 0.08em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin-top: 8px;\n  }\n  .site-preview .sp-photo {\n    position: absolute;\n    right: 60px;\n    top: 50%;\n    transform: translateY(-50%);\n    width: 280px;\n    height: 220px;\n    border-radius: 8px;\n    background:\n      repeating-linear-gradient(135deg,\n        rgba(255,255,255,0.04) 0px,\n        rgba(255,255,255,0.04) 14px,\n        transparent 14px,\n        transparent 28px),\n      rgba(255,255,255,0.02);\n    border: 1px solid var(--rule);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: var(--mono);\n    font-size: 24px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n\n\n  /* ============================================================\n     CC3 additions: terminal, file tree, chip flow, pipeline\n     ============================================================ */\n\n  /* Terminal/code mock */\n  .term {\n    background: #050505;\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    overflow: hidden;\n    font-family: var(--mono);\n    font-size: 26px;\n    width: 100%;\n  }\n  .term .term-bar {\n    background: rgba(255,255,255,0.04);\n    border-bottom: 1px solid var(--rule);\n    padding: 18px 24px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    font-family: var(--mono);\n    font-size: 20px;\n    color: var(--ink-mute);\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n  }\n  .term .term-bar .tdot { width: 14px; height: 14px; border-radius: 50%; background: #3a3a3a; }\n  .term .term-bar .tdot.y { background: var(--accent); }\n  .term .term-bar .tlabel { margin-left: 14px; }\n  .term .term-body {\n    padding: 32px 30px;\n    line-height: 1.85;\n    color: #d8d6cf;\n    font-size: 26px;\n  }\n  .term .term-body .prompt { color: var(--accent); margin-right: 8px; }\n  .term .term-body .muted { color: var(--ink-mute); }\n  .term .term-body .ok { color: var(--accent); }\n  .term .term-body .injected {\n    display: block;\n    background: oklch(0.90 0.19 96 / 0.10);\n    border-left: 4px solid var(--accent);\n    padding: 14px 18px;\n
