lass=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 04 · CHAT vs CLAUDE CODE\n       ============================================================ -->\n  <section class=\"slide\" data-screen-label=\"04 Chat vs Code\">\n    <div class=\"layout-stack\" style=\"padding:140px 200px 120px;gap:48px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Difference<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:108px;\">Chat vs. <em class=\"accent\">Claude Code.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"two-up\" style=\"gap:36px;\">\n        <div class=\"callout\">\n          <div class=\"co-label\">01 / A Chatbot<\u002Fdiv>\n          <p class=\"co-h\">Gives you an answer to copy &amp; paste.<\u002Fp>\n          <p class=\"co-body\">You do the work of getting it into the right place. The chatbot is a talker. You’re the doer.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"callout bolt\">\n          <div class=\"co-label\">02 / Claude Code<\u002Fdiv>\n          <p class=\"co-h\">Does the actual work.<\u002Fp>\n          <p class=\"co-body\">On your machine, in your files. It acts, checks itself, fixes what’s wrong, and keeps going.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"lede\" style=\"font-size:28px;color:var(--accent);letter-spacing:0.22em;text-transform:uppercase;margin-top:8px;\">ANSWERS VS. ACTION. THAT’S THE WHOLE SHIFT.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 05 · YOU'RE ALWAYS IN CONTROL\n       ============================================================ -->\n  <section class=\"slide bg-center\" data-screen-label=\"05 In Control\">\n    <svg class=\"stars- pb-desc\">Clones · verifies · rebrands.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pipe-arrow\">→<\u002Fdiv>\n        <div class=\"pipe-box\">\n          <div class=\"pb-label\">Output<\u002Fdiv>\n          <div class=\"pb-title\">Website<\u002Fdiv>\n          <div class=\"pb-desc\">Ready to show.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"lede\" style=\"font-size:30px;text-align:center;margin-top:8px;\">In the chat, you type one thing: <span style=\"font-family:var(--mono);color:var(--accent);background:oklch(0.90 0.19 96 / 0.10);padding:6px 14px;border-radius:4px;\">“build the site.”<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 16 · THE SCREENSHOT LOOP\n       ============================================================ -->\n  <section class=\"slide bg-center\" data-screen-label=\"16 Screenshot Loop\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n      <g fill=\"#ffffff\">\n        <path d=\"M200 200 L206 232 L238 238 L206 244 L200 276 L194 244 L162 238 L194 232 Z\" opacity=\"0.42\"><\u002Fpath>\n        <path d=\"M1720 880 L1726 912 L1758 918 L1726 924 L1720 956 L1714 924 L1682 918 L1714 912 Z\" opacity=\"0.45\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <div class=\"layout-center\" style=\"padding:120px 180px;gap:36px;\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Heart Of It<\u002Fspan><\u002Fdiv>\n      <h1 class=\"statement\" style=\"font-size:120px;max-width:1700px;\">The screenshot <em>loop.<\u002Fem><\u002Fh1>\n\n      <svg viewBox=\"0 0 700 560\" style=\"width:560px;max-width:90%;margin-top:8px;\" aria-hidden=\"true\">\n        <defs>\n          <marker id=\"ah4\" markerWidth=\"14\" markerHeight=\"14\" refX=\"10\" refY=\"4\" orient=\"auto\">\n            <path d=\"M0,0 L10,4 L0,8 Z\" fill=\"#F0C41A\"><\u002Fpath>\n          <\u002Fmarker>\n        <\u002Fdefs>\n        <!-- BUILD top -->\n        <circle cx=\"350\" cy=\"100\" r=\"86\" fill=\"rgba(255,255,255,0.02)\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"2\"><\u002Fcircle>\n        <text x=\"350\" y=\"98\" text-anchor=\"middle\" fill=\"#ffffff\" font-family=\"Saira Condensed, Impact, sans-serif\" font-weight=\"900\" font-size=\"40\">BUILD<\u002Ftext>\n        <text x=\"350\" y=\"128\" text-anchor=\"middle\" fill=\"#ABA89F\" font-family=\"JetBrains Mono, monospace\" font-size=\"18\" letter-spacing=\"2\">A VERSION<\u002Ftext>\n        <!-- SHOT right -->\n        <circle cx=\"580\" cy=\"290\" r=\"86\" fill=\"rgba(255,255,255,0.02)\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"2\"><\u002Fcircle>\n        <text x=\"580\" y=\"288\" text-anchor=\"middle\" fill=\"#ffffff\" font-family=\"Saira Condensed, Impact, sans-serif\" font-weight=\"900\" font-size=\"40\">SHOT<\u002Ftext>\n        <text x=\"580\" y=\"318\" text-anchor=\"middle\" fill=\"#ABA89F\" font-family=\"JetBrains Mono, monospace\" font-size=\"18\" letter-spacing=\"2\">ITS OWN WORK<\u002Ftext>\n        <!-- COMPARE bottom (highlighted) -->\n        <circle cx=\"350\" cy=\"460\" r=\"86\" fill=\"#F0C41A\" stroke=\"#F0C41A\" stroke-width=\"2\"><\u002Fcircle>\n        <text x=\"350\" y=\"458\" text-anchor=\"middle\" fill=\"#050505\" font-family=\"Saira Condensed, Impact, sans-serif\" font-weight=\"900\" font-style=\"italic\" font-size=\"36\">COMPARE<\u002Ftext>\n        <text x=\"350\" y=\"488\" text-anchor=\"middle\" fill=\"rgba(0,0,0,0.7)\" font-family=\"JetBrains Mono, monospace\" font-size=\"18\" letter-spacing=\"2\">TO REFERENCE<\u002Ftext>\n        <!-- FIX left -->\n        <circle cx=\"120\" cy=\"290\" r=\"86\" fill=\"rgba(255,255,255,0.02)\" stroke=\"rgba(255,255,255,0.18)\" stroke-width=\"2\"><\u002Fcircle>\n        <text x=\"120\" y=\"288\" text-anchor=\"middle\" fill=\"#ffffff\" font-family=\"Saira Condensed, Impact, sans-serif\" font-weight=\"900\" font-size=\"40\">FIX<\u002Ftext>\n        <text x=\"120\" y=\"318\" text-anchor=\"middle\" fill=\"#ABA89F\" font-family=\"JetBrains Mono, monospace\" font-size=\"18\" letter-spacing=\"2\">THE GAPS<\u002Ftext>\n        <!-- Arrows -->\n        <path d=\"M420,150 C480,180 520,220 540,245\" stroke=\"#F0C41A\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#ah4)\"><\u002Fpath>\n        <path d=\"M540,350 C500,400 440,440 420,448\" stroke=\"#F0C41A\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#ah4)\"><\u002Fpath>\n        <path d=\"M280,448 C220,440 180,400 160,360\" stroke=\"#F0C41A\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#ah4)\"><\u002Fpath>\n        <path d=\"M160,235 C180,200 220,165 280,145\" stroke=\"#F0C41A\" stroke-width=\"3\" fill=\"none\" marker-end=\"url(#ah4)\"><\u002Fpath>\n      <\u002Fsvg>\n\n      <p class=\"lede\" style=\"font-size:30px;max-width:1400px;text-align:center;margin-top:8px;\">It loops on its own until it’s <em class=\"accent\">~99% there.<\u002Fem> You just watch.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 17 · SWAP & REPEAT\n       ============================================================ -->\n  <section class=\"slide bg-center\" data-screen-label=\"17 Swap Repeat\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n      <g fill=\"#ffffff\">\n        <path d=\"M1740 200 L1746 232 L1778 238 L1746 244 L1740 276 L1734 244 L1702 238 L1734 232 Z\" opacity=\"0.45\"><\u002Fpath>\n        <path d=\"M180 880 L185 904 L209 909 L185 914 L180 938 L175 914 L151 909 L175 904 Z\" opacity=\"0.40\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <div class=\"layout-center\" style=\"padding:160px 180px;gap:48px;\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Payoff<\u002Fspan><\u002Fdiv>\n      <h1 class=\"statement\" style=\"font-size:124px;max-width:1700px;\">Next client?<br>Swap <em>two folders.<\u002Fem><\u002Fh1>\n\n      <div class=\"chip-flow\" style=\"margin-top:16px;\">\n        <span class=\"chip accent\">new screenshot → /reference<\u002Fspan>\n        <span class=\"chip accent\">new details → /clients<\u002Fspan>\n        <span class=\"chev\">then<\u002Fspan>\n        <span class=\"chip\" style=\"font-family:var(--mono);\">“build the site”<\u002Fspan>\n      <\u002Fdiv>\n\n      <p class=\"lede\" style=\"font-size:30px;max-width:1400px;text-align:center;margin-top:24px;\">CLAUDE.md and your skills never change. <em class=\"accent\">That’s the whole machine — by hand.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 18 · SUPERPOWER\n       ============================================================ -->\n  <section class=\"slide bg-center\" data-screen-label=\"18 Superpower\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n      <g fill=\"#ffffff\">\n        <path d=\"M260 220 L266 252 L298 258 L266 264 L260 296 L254 264 L222 258 L254 252 Z\" opacity=\"0.40\"><\u002Fpath>\n        <path d=\"M1700 820 L1706 852 L1738 858 L1706 864 L1700 896 L1694 864 L1662 858 L1694 852 Z\" opacity=\"0.40\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <div class=\"layout-center\" style=\"padding:180px 200px;gap:36px;z-index:10;\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Why It Matters<\u002Fspan><\u002Fdiv>\n      <h1 class=\"statement\" style=\"font-size:144px;max-width:1700px;\">A site that rivals<br>any <em>agency’s<\u002Fem> — fast.<\u002Fh1>\n      <p class=\"lede\" style=\"font-size:32px;max-width:1500px;text-align:center;margin-top:16px;\">That’s the <em class=\"accent\">“I built you something”<\u002Fem> offer, made real. The building stops being scary — <em class=\"accent\">the selling becomes the point.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 19 · PRIMING\n       ============================================================ -->\n  <section class=\"slide\" data-screen-label=\"19 Priming\">\n    <div class=\"layout-stack\" style=\"padding:180px 200px 160px;gap:56px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Why Now<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:120px;\">We’re <em class=\"accent\">priming<\u002Fem> you.<\u002Fh1>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:32px;\">\n        <div class=\"chip-flow\" style=\"justify-content:flex-start;\">\n          <span class=\"chip accent\">Week 1 — get comfortable (you’re here)<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"chip-flow\" style=\"justify-content:flex-start;\">\n          <span class=\"chip\">Week 2 — your niche &amp; offer<\u002Fspan>\n          <span class=\"chev\">→<\u002Fspan>\n          <span class=\"chip\">then build &amp; sell<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"lede\" style=\"font-size:30px;max-width:1500px;margin-top:8px;\">Get comfortable with the tool this week. After Week 2, building won’t scare you, so you can <em class=\"accent\">focus on selling.<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 20 · FEED IT THE BEST (RESOURCES)\n       ============================================================ -->\n  <section class=\"slide\" data-screen-label=\"20 Resources\">\n    <div class=\"layout-stack\" style=\"padding:140px 200px 120px;gap:48px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Where To Find The Good Stuff<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:104px;\">Feed it the <em class=\"accent\">best.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n\n      <div class=\"two-up\" style=\"gap:36px;\">\n        <div class=\"callout\">\n          <div class=\"co-label\">◆ References — What To Clone<\u002Fdiv>\n          <p class=\"co-body\">Award-winning sites and landing pages. Screenshot one and clone it. Great reference in → great site out.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:18px;\">\n            <span style=\"font-family:var(--mono);font-size:22px;color:var(--accent);letter-spacing:0.04em;\">→ awwwards.com<\u002Fspan>\n            <span style=\"font-family:var(--mono);font-size:22px;color:var(--accent);letter-spacing:0.04em;\">→ lapa.ninja<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"callout\">\n          <div class=\"co-label\">◆ Components — To Level Up<\u002Fdiv>\n          <p class=\"co-body\">Galleries, buttons, animations. Copy the component’s prompt → paste it straight into Claude Code.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:18px;\">\n            <span style=\"font-family:var(--mono);font-size:22px;color:var(--accent);letter-spacing:0.04em;\">→ 21st.dev/community/components<\u002Fspan>\n            <span style=\"font-family:var(--mono);font-size:22px;color:var(--accent);letter-spacing:0.04em;\">→ reactbits.dev<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"lede\" style=\"font-size:28px;color:var(--accent);letter-spacing:0.22em;text-transform:uppercase;margin-top:8px;\">Garbage in, garbage out — start with the best.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 21 · HOMEWORK\n       ============================================================ -->\n  <section class=\"slide\" data-screen-label=\"21 Homework\">\n    <!-- Checkbox grid motif -->\n    <div class=\"slide-motif motif-check\" aria-hidden=\"true\">\n      <div class=\"mc\" style=\"top:8%;left:6%;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"top:8%;left:20%;width:50px;height:50px;opacity:0.04;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"top:14%;right:8%;width:80px;height:80px;opacity:0.04;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"bottom:10%;right:6%;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"bottom:12%;left:14%;width:40px;height:40px;opacity:0.03;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"layout-stack\" style=\"padding:140px 200px 120px;gap:48px;z-index:10;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Before Friday<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:112px;\">Your <em class=\"accent\">homework.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n\n      <ul class=\"hw-list\">\n        <li>\n          <div class=\"hw-n\">01<\u002Fdiv>\n          <div class=\"hw-box\"><\u002Fdiv>\n          <div class=\"hw-text\" data-comment-anchor=\"51568cc51a-div\"><b>Set up the folders.<\u002Fb> <span style=\"font-family:var(--mono);color:var(--accent);\">CLAUDE.md · reference · clients · skills · output<\u002Fspan><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <div class=\"hw-n\">02<\u002Fdiv>\n          <div class=\"hw-box\"><\u002Fdiv>\n          <div class=\"hw-text\"><b>Drop in a screenshot + a business.<\u002Fb> Grab a reference from Awwwards or Lapa Ninja; full-page screenshot it. Add any business’s details to <span style=\"font-family:var(--mono);color:var(--accent);\">/clients<\u002Fspan>.<\u002Fdiv>\n        <\u002Fli>\n        <li style=\"background:oklch(0.90 0.19 96 / 0.05);border-color:oklch(0.90 0.19 96 / 0.40);\">\n          <div class=\"hw-n\" style=\"color:var(--accent);\">03<\u002Fdiv>\n          <div class=\"hw-box\"><\u002Fdiv>\n          <div class=\"hw-text\"><b>Say “build the site” — let it loop.<\u002Fb> Load your skills. Watch it clone, verify, and rebrand.<\u002Fdiv>\n        <\u002Fli>\n      <\u002Ful>\n\n      <p class=\"lede\" style=\"font-size:28px;color:var(--accent);letter-spacing:0.22em;text-transform:uppercase;margin-top:8px;\">BRING WHAT YOU BUILT TO NEXT WEEK.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n\n  <!-- ============================================================\n       SLIDE 22 · CLOSE / QUESTIONS\n       ============================================================ -->\n  <section class=\"slide bg-center\" data-screen-label=\"22 Questions\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\">\n      <g fill=\"#ffffff\">\n        <path d=\"M240 200 L246 232 L278 238 L246 244 L240 276 L234 244 L202 238 L234 232 Z\" opacity=\"0.45\"><\u002Fpath>\n        <path d=\"M1700 300 L1706 332 L1738 338 L1706 344 L1700 376 L1694 344 L1662 338 L1694 332 Z\" opacity=\"0.45\"><\u002Fpath>\n        <path d=\"M1500 820 L1506 852 L1538 858 L1506 864 L1500 896 L1494 864 L1462 858 L1494 852 Z\" opacity=\"0.40\"><\u002Fpath>\n        <path d=\"M360 880 L366 912 L398 918 L366 924 L360 956 L354 924 L322 918 L354 912 Z\" opacity=\"0.40\"><\u002Fpath>\n      <\u002Fg>\n    <\u002Fsvg>\n\n    <div class=\"layout-center\" style=\"padding:180px 200px;gap:40px;z-index:10;\">\n      <
