e\" aria-hidden=\"true\"><g fill=\"#ffffff\"><path d=\"M140 130 L146 162 L178 168 L146 174 L140 206 L134 174 L102 168 L134 162 Z\" opacity=\"0.45\"/><path d=\"M1800 200 L1805 224 L1829 229 L1805 234 L1800 258 L1795 234 L1771 229 L1795 224 Z\" opacity=\"0.45\"/><path d=\"M1700 920 L1705 944 L1729 949 L1705 954 L1700 978 L1695 954 L1671 949 L1695 944 Z\" opacity=\"0.4\"/><path d=\"M200 950 L205 974 L229 979 L205 984 L200 1008 L195 984 L171 979 L195 974 Z\" opacity=\"0.4\"/><\u002Fg><\u002Fsvg>\n    <div class=\"cc2-hero\">\n      <h1 class=\"cc2-title\" style=\"font-size:260px;line-height:0.9;\" data-comment-anchor=\"dfe12a855a-div\">Niche &amp;<br/>Offer<\u002Fh1>\n      <p class=\"cc2-sub\">Today you choose your lane, do the research that uncovers your value, learn how to package an irresistible offer, build the confidence to put it out, and pick the outreach method you&rsquo;ll run first. This is where the agency is actually born.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"02 Why First\">\n    <div class=\"layout-stack\" style=\"padding:120px 200px 110px;gap:34px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Why This Comes First<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:104px;\">Foundation isn&rsquo;t <em class=\"accent\">busywork.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1640px;\">Everything downstream, fulfilment with Claude Code, pricing, scaling, falls apart if the foundation is shaky. Get this right and the rest gets easy. You stop being a freelancer selling time and become a <em class=\"accent\">specialist selling value.<\u002Fem><\u002Fp>\n      <ol class=\"steps\" style=\"gap:8px;\">\n        <li style=\"padding-bottom:16px;grid-template-columns:100px 1fr;gap:28px;\"><div class=\"n\" style=\"font-size:72px;\">01<\u002Fdiv><div class=\"body\"><div class=\"title\" style=\"font-size:40px;\">Choose the niche<\u002Fdiv><div class=\"desc\" style=\"font-size:25px;\">Who you serve, all day, every day.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li style=\"padding-bottom:16px;grid-template-columns:100px 1fr;gap:28px;\"><div class=\"n\" style=\"font-size:72px;\">02<\u002Fdiv><div class=\"body\"><div class=\"title\" style=\"font-size:40px;\">Do the research<\u002Fdiv><div class=\"desc\" style=\"font-size:25px;\">Uncover the strategy that delivers value.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li style=\"padding-bottom:16px;grid-template-columns:100px 1fr;gap:28px;\"><div class=\"n\" style=\"font-size:72px;\">03<\u002Fdiv><div class=\"body\"><div class=\"title\" style=\"font-size:40px;\">Package the offer<\u002Fdiv><div class=\"desc\" style=\"font-size:25px;\">Make it irresistible and risk-free.<\u002Fdiv><\u002Fdiv><\u002Fli>\n        <li style=\"padding-bottom:16px;grid-template-columns:100px 1fr;gap:28px;border-bottom:none;\"><div class=\"n\" style=\"font-size:72px;color:var(--accent);\">04<\u002Fdiv><div class=\"body\"><div class=\"title\" style=\"font-size:40px;\">Build confidence &amp; pick outreach<\u002Fdiv><div class=\"desc\" style=\"font-size:25px;\">One channel, run it hard.<\u002Fdiv><\u002Fdiv><\u002Fli>\n      <\u002Fol>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"03 The Order\">\n    <div class=\"layout-stack\" style=\"padding:150px 160px 130px;gap:42px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Sequence<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:104px;\">The foundation <em class=\"accent\">order.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1620px;\">Do these in order. Each step feeds the next. You can&rsquo;t craft a great offer without first knowing your niche and what your competitors are really selling.<\u002Fp>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:14px;\">\n        <span class=\"chip\">1 &middot; Pick niche<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">2 &middot; Competitor research<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">3 &middot; Market research<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">4 &middot; Strategy doc<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">5 &middot; Craft offer<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">6 &middot; Social + site<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\">7 &middot; Take to market<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;color:var(--ink-mute);letter-spacing:0.12em;text-transform:uppercase;margin-top:6px;\">Today we work through steps 1 to 6. Outreach (step 7) is where it pays off.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"04 Roadmap\">\n    <div class=\"layout-stack\" style=\"padding:120px 160px 110px;gap:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Today&rsquo;s Roadmap<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:104px;\">Where we&rsquo;re <em class=\"accent\">headed.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:28px;\">\n        <div class=\"oc-card\" style=\"padding:34px 36px;\"><div class=\"oc-n\">01<\u002Fdiv><div class=\"oc-t\" style=\"font-size:52px;\">Niche<\u002Fdiv><div class=\"oc-d\" style=\"font-size:25px;\">Pick it on the right factors.<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:34px 36px;\"><div class=\"oc-n\">02<\u002Fdiv><div class=\"oc-t\" style=\"font-size:52px;\">Research<\u002Fdiv><div class=\"oc-d\" style=\"font-size:25px;\">Competitors, market &amp; platform.<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:34px 36px;\"><div class=\"oc-n\">03<\u002Fdiv><div class=\"oc-t\" style=\"font-size:52px;\">The real goal<\u002Fdiv><div class=\"oc-d\" style=\"font-size:25px;\">What they actually want.<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:34px 36px;\"><div class=\"oc-n\">04<\u002Fdiv><div class=\"oc-t\" style=\"font-size:52px;\">The offer<\u002Fdiv><div class=\"oc-d\" style=\"font-size:25px;\">Irresistible &amp; risk-free.<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:34px 36px;\"><div class=\"oc-n\">05<\u002Fdiv><div class=\"oc-t\" style=\"font-size:52px;\">Authority + booking<\u002Fdiv><div class=\"oc-d\" style=\"font-size:25px;\">Profile &amp; easy scheduling.<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:34px 36px;\"><div class=\"oc-n\">06<\u002Fdiv><div class=\"oc-t\" style=\"font-size:52px;\">Outreach<\u002Fdiv><div class=\"oc-d\" style=\"font-size:25px;\">5 methods &amp; the cold call.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"05 Niche 1\">\n    <div class=\"layout-stack\" style=\"padding:120px 160px 105px;gap:32px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 1 &middot; Niche (1 of 2)<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:100px;\">Pick your <em class=\"accent\">niche.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:29px;max-width:1640px;\">Niching down lets you specialise, charge premium, and become &ldquo;the guy.&rdquo; First, judge the money side:<\u002Fp>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:20px;max-width:1640px;\"><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Ticket size first.<\u002Fb> One client should be able to pay for the whole project, and a second makes you both profitable. High-ticket beats high-volume.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Industry size, but don&rsquo;t obsess.<\u002Fb> Big enough to have room, not so big it&rsquo;s saturated. A smaller &ldquo;blue ocean&rdquo; can still print.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Recession proof?<\u002Fb> Will they still spend when things tighten? (The trampoline park shut down in COVID.)<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Already done work there?<\u002Fb> Existing momentum is a strong signal.<\u002Fdiv><\u002Fli><\u002Ful>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"06 Niche 2\">\n    <div class=\"layout-stack\" style=\"padding:120px 160px 105px;gap:32px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 1 &middot; Niche (2 of 2)<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:100px;\">Pick your <em class=\"accent\">niche.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:20px;max-width:1640px;\"><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">B2C over B2B.<\u002Fb> Consumer-facing businesses actually use the website to win trust and customers, so a great site is worth far more to them.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Standardised blueprint.<\u002Fb> Are the businesses similar enough to systemise? (Window cleaning = yes. &ldquo;Insurance&rdquo; = too many different sub-types.)<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Who benefits most from a website?<\u002Fb> High-commitment, &ldquo;serious&rdquo; decisions where the customer researches before buying. Surgeons, hair transplants, roofing, dentists, med spas.<\u002Fdiv><\u002Fli><\u002Ful>\n      <p class=\"lede\" style=\"font-size:28px;color:var(--accent);letter-spacing:0.02em;margin-top:6px;text-wrap:pretty;\">The more a customer researches before they buy, the more a trust-building site is worth.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide bg-center\" data-screen-label=\"07 The Guy\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\"><g fill=\"#ffffff\"><path d=\"M240 220 L246 252 L278 258 L246 264 L240 296 L234 264 L202 258 L234 252 Z\" opacity=\"0.44\"/><path d=\"M1700 860 L1706 892 L1738 898 L1706 904 L1700 936 L1694 904 L1662 898 L1694 892 Z\" opacity=\"0.40\"/><\u002Fg><\u002Fsvg>\n    <div class=\"layout-center\" style=\"padding:140px 200px;gap:26px;\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Then Commit<\u002Fspan><\u002Fdiv>\n      <h1 class=\"statement\" style=\"font-size:120px;max-width:1500px;\">Become <em>the guy.<\u002Fem><\u002Fh1>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1450px;text-align:center;\">Once you&rsquo;ve made an informed decision, go with it. Plant the flag publicly. Don&rsquo;t wait to feel ready.<\u002Fp>\n      <div style=\"margin-top:14px;padding:34px 60px;border:1px solid oklch(0.90 0.19 96 / 0.45);background:oklch(0.90 0.19 96 / 0.06);font-family:var(--hero);font-weight:900;font-size:68px;line-height:1;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;\">&ldquo;I&rsquo;m the <em class=\"em-bolt\">[niche]<\u002Fem> website guy.&rdquo;<\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;max-width:1450px;text-align:center;margin-top:8px;\">Post it. Specialising is what opens the doors. Networks, referrals, premium pricing. It&rsquo;s a stepping stone, not a life sentence. Don&rsquo;t be afraid to claim it.<\u002Fp>\n      <p class=\"lede\" style=\"font-size:25px;max-width:1300px;text-align:center;color:var(--ink-mute);letter-spacing:0.04em;\">Roofing &amp; King Contractor = the proof-of-concept, not the only niche.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"08 Platform\">\n    <div class=\"layout-stack\" style=\"padding:150px 160px 130px;gap:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 2 &middot; Platform<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:96px;\">Where does your niche <em class=\"accent\">hang out?<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1640px;\">You can&rsquo;t fish where there are no fish. Find the watering hole before you write a single message, and log it all in a sheet.<\u002Fp>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:16px;margin:44px 0 14px;\">\n        <span class=\"chip\">Search &ldquo;[niche] owners&rdquo; on Facebook<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\" data-comment-anchor=\"8e7f34e92c-div\">Find the groups &amp; check they&rsquo;re popping<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\" data-comment-anchor=\"c5b44de929-div\">Note FB / IG / LinkedIn / forums<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;color:var(--ink-mute);letter-spacing:0.02em;margin-top:4px;text-wrap:pretty;\">Different demographics live in different places. B2C trades cluster on Facebook; clinics &amp; pro services skew LinkedIn/Instagram. Go where <em class=\"accent\">they<\u002Fem> are, then build your sheet of prospects.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"09 Winners\">\n    <div class=\"layout-stack\" style=\"padding:120px 160px 110px;gap:36px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 3 &middot; Research<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:104px;\">Study the <em class=\"accent\">winners.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:29px;max-width:1640px;\">Look at the agencies already winning in your niche. They&rsquo;re &ldquo;just&rdquo; web designers, but what they actually sell is a <em class=\"accent\">strategy that delivers value.<\u002Fem> Your job is to uncover that blueprint and replicate it.<\u002Fp>\n      <div class=\"two-up\" style=\"gap:36px;\">\n        <div class=\"callout\" style=\"min-height:0;\"><div class=\"co-label\">On The Competitor<\u002Fdiv><div class=\"co-h\" style=\"font-size:46px;\">How they operate<\u002Fdiv><p class=\"co-body\">What they price, how they position, where they&rsquo;re niche vs. generic.<\u002Fp><\u002Fdiv>\n        <div class=\"callout\" style=\"min-height:0;\"><div class=\"co-label\">On Their Website<\u002Fdiv><div class=\"co-h\" style=\"font-size:46px;\">What earns trust<\u002Fdiv><p class=\"co-body\">Trust badges, reviews, real-life video, case studies (situation &rarr; solution &rarr; result), CTAs &amp; friction.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;color:var(--accent);letter-spacing:0.04em;margin-top:2px;text-wrap:pretty;\">Watch for the big tell: are they selling features, or results? Sell results.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"10 Real Goal\">\n    <div class=\"layout-stack\" style=\"padding:120px 160px 110px;gap:38px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 3 &middot; Deep Research<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:100px;\">They don&rsquo;t want a <em class=\"accent\">website.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:29px;max-width:1640px;\">Research what your niche really wants from a marketer or web designer, and the exact words <em class=\"accent\">they<\u002Fem> use. Mirror that verbiage back in your offer and on calls.<\u002Fp>\n      <div class=\"versus\">\n        <div class=\"col old\" data-comment-anchor=\"5722dc8515-div\"><div class=\"vs-label\">The Surface Ask<\u002Fdiv><div class=\"vs-h\" style=\"font-size:60px;text-decoration:none;color:#fff;\">&ldquo;A new website&rdquo;<\u002Fdiv><div class=\"vs-d\">Nice design, modern look, mobile-friendly.<\u002Fdiv><\u002Fdiv>\n        <div class=\"div\">&rarr;<\u002Fdiv>\n        <div class=\"col new\"><div class=\"vs-label\">The Real Goal<\u002Fdiv><div class=\"vs-h\" style=\"font-size:60px;\">Trust &amp; customers<\u002Fdiv><div class=\"vs-d\">Be chosen over competitors. More booked jobs. Look like the obvious safe choice.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;color:var(--ink-mute);letter-spacing:0.12em;text-transform:uppercase;margin-top:2px;\">Collect their phrases now. They become your headlines later.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"11 The Lens\">\n    <div class=\"layout-stack\" style=\"padding:110px 160px 100px;gap:30px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Lens<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:92px;\">Traffic &middot; Trust &middot; <em class=\"accent\">Conversion.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:28px;max-width:1640px;\">Every successful website does three things. This is the framework you use to review sites, build your strategy, and explain your value to a prospect.<\u002Fp>\n      <div class=\"pillars\" style=\"margin-top:0;\">\n        <div class=\"pillar\" style=\"min-height:360px;\"><div class=\"p-num\">01<\u002Fdiv><div class=\"p-title\">Traffic<\u002Fdiv><div class=\"p-desc\">Get the right people to the site. SEO, ads, presence.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pillar\" style=\"min-height:360px;\"><div class=\"p-num\">02<\u002Fdiv><div class=\"p-title\">Trust<\u002Fdiv><div class=\"p-desc\">Make them believe. Reviews, proof, faces, badges, results.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pillar\" style=\"min-height:360px;\"><div class=\"p-num\">03<\u002Fdiv><div class=\"p-title\">Conversion<\u002Fdiv><div class=\"p-desc\">Make it easy to act. Clear CTAs, frictionless contact.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--accent);letter-spacing:0.04em;margin-top:2px;\">Layer your unique mechanism into each. This same framework = great content.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"12 The Offer\">\n    <div class=\"layout-stack\" style=\"padding:140px 160px 120px;gap:42px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 4 &middot; The Offer<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:96px;\">Build an irresistible <em class=\"accent\">offer.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1640px;\">The offer changes with your stage of business. Early on, you carry the risk to win trust; as your proof grows, you shift the risk back to them.<\u002Fp>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:14px;\">\n        <span class=\"chip\"><b style=\"color:var(--accent);font-weight:600;\">Stage 1<\u002Fb> &nbsp;Free <span style=\"color:var(--ink-mute);\">(portfolio + experience)<\u002Fspan><\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\"><b style=\"color:var(--accent);font-weight:600;\">Stage 2<\u002Fb> &nbsp;Free upfront <span style=\"color:var(--ink-mute);\">(pay if you like it)<\u002Fspan><\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\"><b style=\"color:var(--accent);font-weight:600;\">Stage 3<\u002Fb> &nbsp;Deposit down<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\"><b style=\"color:var(--accent);font-weight:600;\">Stage 4<\u002Fb> &nbsp;Payment plan<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\"><b style=\"font-weight:600;\">Stage 5<\u002Fb> &nbsp;Raise prices<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--ink-mute);letter-spacing:0.1em;text-transform:uppercase;margin-top:4px;\">Reference: Alex Hormozi, &ldquo;$100M Offers.&rdquo;<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"13 Free Upfront\">\n    <div class=\"layout-stack\" style=\"padding:108px 160px 92px;gap:30px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Beginner Power Move<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:90px;\">The free-upfront <em class=\"accent\">offer.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:28px;max-width:1660px;\">You build a <strong style=\"color:#fff;\">live homepage<\u002Fstrong> and have the <strong style=\"color:#fff;\">proposal ready<\u002Fstrong> before you ever get on the call. They only pay if they love it. It feels insane to the prospect, which is exactly why it cuts through the spam.<\u002Fp>\n      <div class=\"two-up\" style=\"gap:36px;\">\n        <div class=\"callout\" style=\"min-height:0;\"><div class=\"co-label\">Why It Works<\u002Fdiv><ul><li>Removes all risk from the prospect.<\u002Fli><li>Proves your confidence and seriousness.<\u002Fli><li>It&rsquo;s tangible. A real, live homepage, not a mockup.<\u002Fli><\u002Ful><\u002Fdiv>\n        <div class=\"callout\" style=\"min-height:0;\"><div class=\"co-label\">Why It&rsquo;s Safe For You<\u002Fdiv><ul><li>~$5 to generate a fully functional live homepage before the call (Website Factory).<\u002Fli><li>No developer until it&rsquo;s sold.<\u002Fli><li>Small risk, huge upside.<\u002Fli><\u002Ful><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--accent);letter-spacing:0.04em;margin-top:2px;\">Goal of the offer = sell the call, not the website.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"14 Anatomy\">\n    <div class=\"layout-stack\" style=\"padding:106px 160px 92px;gap:26px;\">\n      <div style=\"display:flex;flex-direction:column;gap:16px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Anatomy<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:92px;\">How the offer is <em class=\"accent\">built.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:0;border-top:1px solid var(--rule);\">\n        <li style=\"display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--rule);\"><div style=\"font-family:var(--hero);font-weight:900;font-size:40px;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;line-height:1;\">Compliment<\u002Fdiv><div style=\"font-family:var(--display);font-weight:500;font-size:27px;line-height:1.3;color:var(--ink-dim);text-wrap:pretty;\">Commend their reviews / work. Specific &amp; genuine.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--rule);\"><div style=\"font-family:var(--hero);font-weight:900;font-size:40px;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;line-height:1;\">Pattern break<\u002Fdiv><div style=\"font-family:var(--display);font-weight:500;font-size:27px;line-height:1.3;color:var(--ink-dim);text-wrap:pretty;\">&ldquo;This&rsquo;ll sound crazy, but hear me out&hellip;&rdquo;<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--rule);\"><div style=\"font-family:var(--hero);font-weight:900;font-size:40px;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;line-height:1;\">The offer<\u002Fdiv><div style=\"font-family:var(--display);font-weight:500;font-size:27px;line-height:1.3;color:var(--ink-dim);text-wrap:pretty;\">A free, custom <em class=\"accent\">live homepage.<\u002Fem> No payment, no risk.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--rule);\"><div style=\"font-family:var(--hero);font-weight:900;font-size:40px;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;line-height:1;\">The &ldquo;catch&rdquo;<\u002Fdiv><div style=\"font-family:var(--display);font-weight:500;font-size:27px;line-height:1.3;color:var(--ink-dim);text-wrap:pretty;\">You get a portfolio piece; you&rsquo;re that confident.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--rule);\"><div style=\"font-family:var(--hero);font-weight:900;font-size:40px;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;line-height:1;\">The process<\u002Fdiv><div style=\"font-family:var(--display);font-weight:500;font-size:27px;line-height:1.3;color:var(--ink-dim);text-wrap:pretty;\">You see the live homepage + proposal up front; if you like it, we build out the full site at an agreed price.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:340px 1fr;gap:40px;align-items:baseline;padding:18px 0;border-bottom:1px solid var(--rule);\"><div style=\"font-family:var(--hero);font-weight:900;font-size:40px;text-transform:uppercase;color:#fff;letter-spacing:-0.005em;line-height:1;\">Risk reversal<\u002Fdiv><div style=\"font-family:var(--display);font-weight:500;font-size:27px;line-height:1.3;color:var(--ink-dim);text-wrap:pretty;\">&ldquo;If I waste your time, coffee&rsquo;s on me.&rdquo; Mutual win.<\u002Fdiv><\u002Fli>\n      <\u002Ful>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--ink-mute);letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;\">Keep it short, hyper-personal, and human. Never a wall of text.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"15 Research Phase\">\n    <div class=\"layout-stack\" style=\"padding:120px 160px 105px;gap:36px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>AIW Stack &middot; Website Factory + Content Engine<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:92px;\">This is the <em class=\"accent\">research phase.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:28px;max-width:1680px;\">Everything you just did, niche, competitor research, market research, strategy doc, offer, is the <em class=\"accent\">exact research &amp; interview phase<\u002Fem> the Website Factory + Content Engine stack walks you through. It assembles your findings into documents you can read, reuse, and build on.<\u002Fp>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:14px;\">\n        <span class=\"chip accent\">Research phase<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Strategy + offer docs<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Cold calls<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Notes: what worked / what didn&rsquo;t<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Feed the engine<\u002Fspan><span class=\"chev\">&#8635;<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--ink-mute);letter-spacing:0.02em;margin-top:4px;text-wrap:pretty;\">After every call, log what landed and what flopped and feed it back in. The engine turns that into sharper <em class=\"accent\">copy<\u002Fem> and the exact <em class=\"accent\">verbiage your niche responds to.<\u002Fem> It gets better the more you talk to people.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"16 Authority\">\n    <div class=\"layout-stack\" style=\"padding:130px 160px 115px;gap:34px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 5 &middot; Authority<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:92px;\">Make your profile <em class=\"accent\">authoritative.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:29px;max-width:1660px;\">Before you reach out, people will check you. Give them a reason to trust you in 5 seconds. People do business with people who look reputable.<\u002Fp>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:20px;max-width:1640px;\"><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Content.<\u002Fb> Post case studies, results, and website reviews using Traffic / Trust / Conversion. Become &ldquo;the [niche] website person&rdquo; publicly.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Images.<\u002Fb> Your face, your work, reviews, examples. Visual proof beats claims.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Position as an equal.<\u002Fb> Confident, helpful, excited for their business. Never an energy leech.<\u002Fdiv><\u002Fli><\u002Ful>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"17 Booking\">\n    <div class=\"layout-stack\" style=\"padding:140px 160px 120px;gap:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 5 &middot; Booking<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:92px;\">Make it easy to <em class=\"accent\">book you.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:29px;max-width:1660px;\">Remove every gram of friction between &ldquo;interested&rdquo; and &ldquo;on a call.&rdquo; When it turns positive, you book them <em class=\"accent\">in the same conversation.<\u002Fem><\u002Fp>\n      <div class=\"two-up\" style=\"gap:36px;\">\n        <div class=\"callout\" style=\"min-height:0;\"><div class=\"co-label\">Pick Any Tool<\u002Fdiv><div class=\"co-h\" style=\"font-size:46px;\">Calendar + video<\u002Fdiv><p class=\"co-body\">Calendly, Google Meet, Zoom, or any calendar that lets you share a link and hop on a video call. Use what&rsquo;s easy.<\u002Fp><\u002Fdiv>\n        <div class=\"callout\" style=\"min-height:0;\"><div class=\"co-label\">Wire It Up<\u002Fdiv><div class=\"co-h\" style=\"font-size:46px;\">Feed it into GHL<\u002Fdiv><p class=\"co-body\">Capture name, email &amp; number &rarr; GoHighLevel handles the reminders &amp; follow-ups automatically.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--accent);letter-spacing:0.04em;margin-top:2px;\">Always schedule the next step while you still have them in the conversation.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"18 Outreach\">\n    <div class=\"layout-stack\" style=\"padding:108px 160px 92px;gap:32px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Step 6 &middot; Outreach<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:96px;\">5 ways to <em class=\"accent\">reach them.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:28px;max-width:1660px;\">Same offer, same market, different mediums. Pick one and run it hard before adding another.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;\">\n        <div class=\"oc-card\" style=\"padding:28px 32px;gap:8px;\"><div class=\"oc-n\">Channel 01<\u002Fdiv><div class=\"oc-t\" style=\"font-size:48px;\">Cold Call<\u002Fdiv><div class=\"oc-d\" style=\"font-size:24px;\">Great &amp; low cost.<\u002Fdiv><div style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-top:auto;padding-top:10px;\">Start here<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:28px 32px;gap:8px;\"><div class=\"oc-n\">Channel 02<\u002Fdiv><div class=\"oc-t\" style=\"font-size:48px;\">Cold DM<\u002Fdiv><div class=\"oc-d\" style=\"font-size:24px;\">Once your profile shows real work.<\u002Fdiv><div style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-top:auto;padding-top:10px;\">After authority<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:28px 32px;gap:8px;\"><div class=\"oc-n\">Channel 03<\u002Fdiv><div class=\"oc-t\" style=\"font-size:48px;\">Cold Email<\u002Fdiv><div class=\"oc-d\" style=\"font-size:24px;\">Strong in Europe / other countries. Weaker in the USA.<\u002Fdiv><div style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-top:auto;padding-top:10px;\">Region-aware<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:28px 32px;gap:8px;\"><div class=\"oc-n\">Channel 04<\u002Fdiv><div class=\"oc-t\" style=\"font-size:48px;\">Content<\u002Fdiv><div class=\"oc-d\" style=\"font-size:24px;\">Amazing, but heavy effort upfront.<\u002Fdiv><div style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-top:auto;padding-top:10px;\">Long game<\u002Fdiv><\u002Fdiv><div class=\"oc-card\" style=\"padding:28px 32px;gap:8px;\"><div class=\"oc-n\">Channel 05<\u002Fdiv><div class=\"oc-t\" style=\"font-size:48px;\">Ads<\u002Fdiv><div class=\"oc-d\" style=\"font-size:24px;\">Work great, need a funnel, ad spend &amp; some product/market fit.<\u002Fdiv><div style=\"font-family:var(--mono);font-size:24px;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-top:auto;padding-top:10px;\">Once dialled<\u002Fdiv><\u002Fdiv>\n        <div class=\"oc-card\" style=\"padding:28px 32px;gap:8px;border-color:oklch(0.90 0.19 96 / 0.45) !important;background:oklch(0.90 0.19 96 / 0.06) !important;\"><div class=\"oc-n\" style=\"color:var(--accent);\">Rule<\u002Fdiv><div class=\"oc-t\" style=\"font-size:48px;\">One channel<\u002Fdiv><div class=\"oc-d\" style=\"font-size:24px;\">Master one before stacking the next.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"19 Cold Call\">\n    <div class=\"layout-stack\" style=\"padding:140px 160px 125px;gap:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Deep Dive &middot; Abou&rsquo;s Gold<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:104px;\">The cold <em class=\"accent\">call.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1660px;\">Lowest cost, fastest feedback, most reps with real prospects. The goal of the call is <em class=\"accent\">not<\u002Fem> to sell a website. It&rsquo;s to sell the next step.<\u002Fp>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:14px;\">\n        <span class=\"chip\">DM / Call<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\">sell the call<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Call<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\">sell the Zoom<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Zoom<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\">sell the website<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;color:var(--ink-mute);letter-spacing:0.02em;margin-top:4px;text-wrap:pretty;\">Move them along the natural progression of trust. Don&rsquo;t rush steps. Every prospect you talk to teaches you the niche, even the ones who don&rsquo;t buy.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"20 The Machine\">\n    <div class=\"layout-stack\" style=\"padding:150px 160px 130px;gap:42px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Acquisition Loop<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:100px;\">The cold-call <em class=\"accent\">machine.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:30px;max-width:1660px;\">A repeatable manual loop you run daily. Manual first, systemise later.<\u002Fp>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:14px;\">\n        <span class=\"chip\">Google Maps <span style=\"color:var(--ink-mute);\">(Apify)<\u002Fspan><\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Call<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Script<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Book call<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\">Generate live homepage<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:27px;color:var(--ink-mute);letter-spacing:0.02em;margin-top:4px;text-wrap:pretty;\">Pull businesses from Maps, dial them, run your script, book the call, and generate a live homepage (~$5) to present. Repeat at volume.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"21 Lead List\">\n    <div class=\"layout-stack\" style=\"padding:112px 160px 98px;gap:32px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Feed The Machine &middot; Apify<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:96px;\">Build the lead <em class=\"accent\">list.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:28px;max-width:1660px;\">Apify is already in your Website Factory stack. Its Google Maps actor turns the manual &ldquo;find a business&rdquo; step into an instant pipeline. Set up a project in Claude and let it do the digging.<\u002Fp>\n      <div class=\"pillars\" style=\"margin-top:0;\">\n        <div class=\"pillar\" style=\"min-height:330px;\"><div class=\"p-num\">Target<\u002Fdiv><div class=\"p-title\" style=\"font-size:50px;\">Maps + niche + area<\u002Fdiv><div class=\"p-desc\">Pull businesses in your niche near you that have no website or a low-quality one. Your warmest cold prospects.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pillar\" style=\"min-height:330px;\"><div class=\"p-num\">Scrape<\u002Fdiv><div class=\"p-title\" style=\"font-size:50px;\">Contact + socials<\u002Fdiv><div class=\"p-desc\">Grab email, phone number, and any social profiles you can reach out on.<\u002Fdiv><\u002Fdiv>\n        <div class=\"pillar\" style=\"min-height:330px;\"><div class=\"p-num\">Assemble<\u002Fdiv><div class=\"p-title\" style=\"font-size:50px;\">Claude builds the list<\u002Fdiv><div class=\"p-desc\">Claude cleans it into a ready-to-dial lead sheet for your script.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"lede\" style=\"font-size:26px;color:var(--accent);letter-spacing:0.04em;margin-top:2px;\">Cost: under ~$5 for 100 leads. Cheap fuel for the cold-call machine.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"22 Call Loop\">\n    <div class=\"layout-stack\" style=\"padding:140px 160px 120px;gap:40px;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Once You&rsquo;re On<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:100px;\">On the call <em class=\"accent\">loop.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"chip-flow\" style=\"justify-content:flex-start;gap:14px;\">\n        <span class=\"chip\">Present<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Sell<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Testimonial<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip\">Learn<\u002Fspan><span class=\"chev\">&rarr;<\u002Fspan>\n        <span class=\"chip accent\">Repeat<\u002Fspan>\n      <\u002Fdiv>\n      <ul style=\"list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:20px;max-width:1640px;\"><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Present<\u002Fb> the live homepage &amp; strategy. Show, don&rsquo;t tell.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Sell<\u002Fb> the result, then ask for the testimonial on the spot.<\u002Fdiv><\u002Fli><li style=\"display:grid;grid-template-columns:46px 1fr;gap:24px;align-items:baseline;\"><span style=\"font-family:var(--mono);font-size:34px;color:var(--accent);line-height:1;\">&rarr;<\u002Fspan><div style=\"font-family:var(--display);font-weight:500;font-size:29px;line-height:1.32;color:var(--ink-dim);text-wrap:pretty;\"><b style=\"color:#fff;font-weight:700;\">Learn<\u002Fb> from every call and feed it back into the script. Repeat.<\u002Fdiv><\u002Fli><\u002Ful>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide bg-center\" data-screen-label=\"23 Operating Law\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\"><g fill=\"#ffffff\"><path d=\"M260 220 L266 252 L298 258 L266 264 L260 296 L254 264 L222 258 L254 252 Z\" opacity=\"0.44\"/><path d=\"M1700 820 L1706 852 L1738 858 L1706 864 L1700 896 L1694 864 L1662 858 L1694 852 Z\" opacity=\"0.40\"/><\u002Fg><\u002Fsvg>\n    <div class=\"layout-center\" style=\"padding:160px 200px;gap:30px;\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>The Operating Law<\u002Fspan><\u002Fdiv>\n      <h1 class=\"statement\" style=\"font-size:160px;max-width:1600px;\">Manual first.<br/>Systemise <em>later.<\u002Fem><\u002Fh1>\n      <p class=\"lede\" style=\"font-size:34px;max-width:1300px;text-align:center;margin-top:8px;\">Do it by hand until you know it works, then automate.<\u002Fp>\n      <p class=\"lede\" style=\"font-size:28px;max-width:1450px;text-align:center;color:var(--ink-mute);\">Volume + reps beat clever tooling early on. Talk to prospects, learn the niche, build the proof. The systems come after the manual version is proven.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide\" data-screen-label=\"24 Action Items\">\n    <div class=\"slide-motif motif-check\" aria-hidden=\"true\">\n      <div class=\"mc\" style=\"top:8%;left:6%;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"top:10%;right:8%;width:80px;height:80px;opacity:0.04;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"bottom:10%;right:6%;\"><\u002Fdiv>\n      <div class=\"mc\" style=\"bottom:13%;left:13%;width:42px;height:42px;opacity:0.03;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"layout-stack\" style=\"padding:100px 160px 90px;gap:34px;z-index:10;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Your Move Today<\u002Fspan><\u002Fdiv>\n        <h1 class=\"h-big\" style=\"font-size:100px;\">Action <em class=\"accent\">items.<\u002Fem><\u002Fh1>\n      <\u002Fdiv>\n      <ul class=\"hw-list\">\n        <li><div class=\"hw-n\">01<\u002Fdiv><div class=\"hw-box\"><\u002Fdiv><div class=\"hw-text\"><b>Lock your niche<\u002Fb> using the ticket-size &amp; recession-proof filters, then claim it publicly.<\u002Fdiv><\u002Fli>\n        <li><div class=\"hw-n\">02<\u002Fdiv><div class=\"hw-box\"><\u002Fdiv><div class=\"hw-text\"><b>Research 3 to 5 competitors.<\u002Fb> What they price, what earns trust, features vs. results.<\u002Fdiv><\u002Fli>\n        <li><div class=\"hw-n\">03<\u002Fdiv><div class=\"hw-box\"><\u002Fdiv><div class=\"hw-text\"><b>Find the watering hole<\u002Fb> + collect their exact verbiage in a sheet.<\u002Fdiv><\u002Fli>\n        <li><div class=\"hw-n\">04<\u002Fdiv><div class=\"hw-box\"><\u002Fdiv><div class=\"hw-text\"><b>Draft your free-upfront offer.<\u002Fb> Live homepage + proposal, using the anatomy.<\u002Fdiv><\u002Fli>\n        <li style=\"background:oklch(0.90 0.19 96 / 0.05);border-color:oklch(0.90 0.19 96 / 0.40);\"><div class=\"hw-n\" style=\"color:var(--accent);\">05<\u002Fdiv><div class=\"hw-box\"><\u002Fdiv><div class=\"hw-text\"><b>Polish your profile<\u002Fb>, set up a booking link &rarr; GHL, and pick your <span style=\"color:var(--accent);\">one<\u002Fspan> outreach channel.<\u002Fdiv><\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"slide bg-center\" data-screen-label=\"25 Next\">\n    <svg class=\"stars-bg\" viewBox=\"0 0 1920 1080\" preserveAspectRatio=\"xMidYMid slice\" aria-hidden=\"true\"><g fill=\"#ffffff\"><path d=\"M240 200 L246 232 L278 238 L246 244 L240 276 L234 244 L202 238 L234 232 Z\" opacity=\"0.44\"/><path d=\"M1700 300 L1706 332 L1738 338 L1706 344 L1700 376 L1694 344 L1662 338 L1694 332 Z\" opacity=\"0.40\"/><\u002Fg><\u002Fsvg>\n    <div class=\"layout-center\" style=\"padding:170px 200px;gap:32px;\">\n      <div class=\"eyebrow\"><span class=\"dot\"><\u002Fspan><span>Wednesday &middot; Session 2 of 2<\u002Fspan><\u002Fdiv>\n      <h1 class=\"statement\" style=\"font-size:150px;max-width:1650px;\">Next: the <em>mechanism.<\u002Fem><\u002Fh1>\n      <p class=\"lede\" style=\"font-size:32px;max-width:1500px;text-align:center;margin-top:10px;\">You&rsquo;ve picked the niche, done the research, and packaged the offer. Wednesday we go into <em class=\"accent\">the blueprint<\u002Fem>. The mechanism we use to justify the price and turn a &ldquo;website&rdquo; into something worth thousands.<\u002Fp>\n      <p class=\"lede\" style=\"font-size:28px;color:var(--accent);letter-spacing:0.18em;text-transform:uppercase;margin-top:6px;\">You can do this. See you Wednesday.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"vignette\"><\u002Fdiv>\n    <div class=\"grain\"><\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<script>\n/**\n * <deck-stage> \u2014 reusable web component for HTML decks.\n *\n * Handles:\n *  (a) speaker notes \u2014 reads <script type=\"application/json\" id=\"speaker-notes\">\n *      and posts {slideIndexChanged: N} to the parent window on nav.\n *  (b) keyboard navigation \u2014 \u2190/\u2192, PgUp/PgDn, Space, Home/End, number keys.\n *      On touch devices, tapping the left/right half of the stage goes\n *      prev/next \u2014 taps on links, buttons and other interactive slide\n *      content are left alone.\n *  (c) press R to reset to slide 0 (with a tasteful keyboard hint).\n *  (d) bottom-center overlay showing slide count + hints, fades out on idle.\n *  (e) auto-scaling \u2014 inner canvas is a fixed design size (default 1920\u00d71080)\n *      scaled with `transform: scale()` to fit the viewport, letterboxed.\n *      Set the `noscale` attribute to render at authored size (1:1) \u2014 the\n *      PPTX exporter sets this so its DOM capture sees unscaled geometry.\n *  (f) print \u2014 `@media print` lays every slide out as its own page at the\n *      design size, so the browser's Print \u2192 Save as PDF produces a clean\n *      one-page-per-slide PDF with no extra setup.\n *  (g) thumbnail rail \u2014 resizable left-hand column of per-slide thumbnails\n *      (static clones). Click to navigate; \u2191/\u2193 with a thumbnail focused to\n *      step between slides; drag to reorder; right-click for\n *      Skip / Move up / Move down / Delete (opens a Cancel/Delete confirm\n *      dialog). Drag the rail's right edge to resize; width persists to\n *      localStorage. Skipped slides carry `data-deck-skip`, are dimmed in\n *      the rail, omitted from prev/next navigation, and hidden at print.\n *      The rail is suppressed in presenting mode, in the host's Preview\n *      mode (ViewerMode='none'), on `noscale`, on narrow viewports\n *      (\u2264640px), and via the `no-rail` attribute. Rail mutations dispatch\n *      a `deckchange`\n *      CustomEvent on the element: detail = {action, from, to, slide}.\n *\n * Slides are HIDDEN, not unmounted. Non-active slides stay in the DOM with\n * `visibility: hidden` + `opacity: 0`, so their state (videos, iframes,\n * form inputs, React trees) is preserved across navigation.\n *\n * Lifecycle event \u2014 the component dispatches a `slidechange` CustomEvent on\n * itself whenever the active slide changes (including the initial mount).\n * The event bubbles and composes out of shadow DOM, so you can listen on\n * the <deck-stage> element or on document:\n *\n *   document.querySelector('deck-stage').addEventListener('slidechange', (e) => {\n *     e.detail.index         // new 0-based index\n *     e.detail.previousIndex // previous index, or -1 on init\n *     e.detail.total         // total slide count\n *     e.detail.slide         // the new active slide element\n *     e.detail.previousSlide // the prior slide element, or null on init\n *     e.detail.reason        // 'init' | 'keyboard' | 'click' | 'tap' | 'api'\n *   });\n *\n * Persistence: none at the deck level. The host app keeps the current slide\n * in its own URL (?slide=) and re-delivers it via location.hash on load, so a\n * bare load with no hash always starts at slide 1.\n *\n * Usage:\n *   <style>deck-stage:not(:defined){visibility:hidden}<\u002Fstyle>\n *   <deck-stage width=\"1920\" height=\"1080\">\n *     <section data-label=\"Title\">...<\u002Fsection>\n *     <section data-label=\"Agenda\">...<\u002Fsection>\n *   <\u002Fdeck-stage>\n *   <script src=\"deck-stage.js\"><\u002Fscript>\n *\n * The :not(:defined) rule prevents a flash of the first slide at its\n * authored styles before this script runs and attaches the shadow root.\n *\n * Slides are the direct element children of <deck-stage>. Each slide is\n * automatically tagged with:\n *   - data-screen-label=\"NN Label\"   (1-indexed, for comment flow)\n *   - data-om-validate=\"no_overflowing_text,no_overlapping_text,slide_sized_text\"\n */\n\n(() => {\n  const DESIGN_W_DEFAULT = 1920;\n  const DESIGN_H_DEFAULT = 1080;\n  const OVERLAY_HIDE_MS = 1800;\n  const VALIDATE_ATTR = 'no_overflowing_text,no_overlapping_text,slide_sized_text';\n  const FINE_POINTER_MQ = matchMedia('(hover: hover) and (pointer: fine)');\n  const NARROW_MQ = matchMedia('(max-width: 640px)');\n  // Slide-authored controls that should keep a tap instead of it navigating.\n  const INTERACTIVE_SEL = 'a[href], button, input, select, textarea, summary, label, video[controls], audio[controls], [role=\"button\"], [onclick], [tabindex]:not([tabindex^=\"-\"]), [contenteditable]:not([contenteditable=\"false\" i])';\n\n  const pad2 = (n) => String(n).padStart(2, '0');\n\n  // Label precedence: data-label \u2192 data-screen-label (number stripped) \u2192 first heading \u2192 \"Slide\".\n  const getSlideLabel = (el) => {\n    const explicit = el.getAttribute('data-label');\n    if (explicit) return explicit;\n\n    const existing = el.getAttribute('data-screen-label');\n    if (existing) return existing.replace(/^\\s*\\d+\\s*/, '').trim() || existing;\n\n    const h = el.querySelector('h1, h2, h3, [data-title]');\n    const t = h && (h.textContent || '').trim().slice(0, 40);\n    if (t) return t;\n\n    return 'Slide';\n  };\n\n  const stylesheet = `\n    :host {\n      position: fixed;\n      inset: 0;\n      display: block;\n      background: #000;\n      color: #fff;\n      font-family: -apple-system, BlinkMacSystemFont, \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n      overflow: hidden;\n      -webkit-tap-highlight-color: transparent;\n    }\n    /* connectedCallback holds this until document.fonts.ready (capped 2s) so\n     * the first visible paint has the deck's real typography + final rail\n     * layout. opacity (not visibility) so the active slide can't un-hide\n     * itself via the ::slotted([data-deck-active]) visibility:visible rule.\n     * Only the stage/rail hide \u2014 the black :host background stays, so the\n     * iframe doesn't flash the page's default white. */\n    :host([data-fonts-pending]) .stage,\n    :host([data-fonts-pending]) .rail { opacity: 0; pointer-events: none; }\n\n    .stage {\n      position: absolute;\n      inset: 0;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n    }\n\n    .canvas {\n      position: relative;\n      transform-origin: center center;\n      flex-shrink: 0;\n      background: #fff;\n      will-change: transform;\n    }\n\n    /* Slides live in light DOM (via <slot>) so authored CSS still applies.\n       We absolutely position each slotted child to stack them. */\n    ::slotted(*) {\n      position: absolute !important;\n      inset: 0 !important;\n      width: 100% !important;\n      height: 100% !important;\n      box-sizing: border-box !important;\n      overflow: hidden;\n      opacity: 0;\n      pointer-events: none;\n      visibility: hidden;\n    }\n    ::slotted([data-deck-active]) {\n      opacity: 1;\n      pointer-events: auto;\n      visibility: visible;\n    }\n\n    .overlay {\n      position: fixed;\n      left: 50%;\n      bottom: 22px;\n      transform: translate(-50%, 6px) scale(0.92);\n      filter: blur(6px);\n      display: flex;\n      align-items: center;\n      gap: 4px;\n      padding: 4px;\n      background: #000;\n      color: #fff;\n      border-radius: 999px;\n      font-size: 12px;\n      font-feature-settings: \"tnum\" 1;\n      letter-spacing: 0.01em;\n      opacity: 0;\n      pointer-events: none;\n      transition: opacity 260ms ease, transform 260ms cubic-bezier(.2,.8,.2,1), filter 260ms ease;\n      transform-origin: center bottom;\n      z-index: 2147483000;\n      user-select: none;\n    }\n    .overlay[data-visible] {\n      opacity: 1;\n      pointer-events: auto;\n      transform: translate(-50%, 0) scale(1);\n      filter: blur(0);\n    }\n\n    .btn {\n      appearance: none;\n      -webkit-appearance: none;\n      background: transparent;\n      border: 0;\n      margin: 0;\n      padding: 0;\n      color: inherit;\n      font: inherit;\n      cursor: default;\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      height: 28px;\n      min-width: 28px;\n      border-radius: 999px;\n      color: rgba(255,255,255,0.72);\n      transition: background 140ms ease, color 140ms ease;\n      -webkit-tap-highlight-color: transparent;\n    }\n    .btn:hover { background: rgba(255,255,255,0.12); color: #fff; }\n    .btn:active { background: rgba(255,255,255,0.18); }\n    .btn:focus { outline: none; }\n    .btn:focus-visible { outline: none; }\n    .btn::-moz-focus-inner { border: 0; }\n    .btn svg { width: 14px; height: 14px; display: block; }\n    .btn.reset {\n      font-size: 11px;\n      font-weight: 500;\n      letter-spacing: 0.02em;\n      padding: 0 10px 0 12px;\n      gap: 6px;\n      color: rgba(255,255,255,0.72);\n    }\n    .btn.reset .kbd {\n      display: inline-flex;\n      align-items: center;\n      justify-content: center;\n      min-width: 16px;\n      height: 16px;\n      padding: 0 4px;\n      font-family: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n      font-size: 10px;\n      line-height: 1;\n      color: rgba(255,255,255,0.88);\n      background: rgba(255,255,255,0.12);\n      border-radius: 4px;\n    }\n\n    .count {\n      font-variant-numeric: tabular-nums;\n      color: #fff;\n      font-weight: 500;\n      padding: 0 8px;\n      min-width: 42px;\n      text-align: center;\n      font-size: 12px;\n    }\n    .count .sep { color: rgba(255,255,255,0.45); margin: 0 3px; font-weight: 400; }\n    .count .total { color: rgba(255,255,255,0.55); }\n\n    .divider {\n      width: 1px;\n      height: 14px;\n      background: rgba(255,255,255,0.18);\n      margin: 0 2px;\n    }\n\n    /* \u2500\u2500 Thumbnail rail \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n       Fixed column on the left; each thumbnail is a static deep-clone of\n       the light-DOM slide scaled into a 16:9 (or design-aspect) frame. The\n       stage re-fits around it (see _fit); hidden during present / noscale\n       / print so capture geometry and fullscreen output are unchanged. */\n    .rail {\n      position: fixed;\n      left: 0;\n      top: 0;\n      bottom: 0;\n      width: var(--deck-rail-w, 188px);\n      background: #141414;\n      border-right: 1px solid rgba(255,255,255,0.08);\n      overflow-y: auto;\n      overflow-x: hidden;\n      padding: 12px 10px;\n      box-sizing: border-box;\n      display: flex;\n      flex-direction: column;\n      gap: 12px;\n      z-index: 2147482500;\n      scrollbar-width: thin;\n      scrollbar-color: rgba(255,255,255,0.18) transparent;\n    }\n    .rail::-webkit-scrollbar { width: 8px; }\n    .rail::-webkit-scrollbar-track { background: transparent; margin: 2px; }\n    .rail::-webkit-scrollbar-thumb {\n      background: rgba(255,255,255,0.18);\n      border-radius: 4px;\n      border: 2px solid transparent;\n      background-clip: content-box;\n    }\n    .rail::-webkit-scrollbar-thumb:hover {\n      background: rgba(255,255,255,0.28);\n      border: 2px solid transparent;\n      background-clip: content-box;\n    }\n    :host([no-rail]) .rail,\n    :host([noscale]) .rail { display: none; }\n    .rail[data-presenting] { display: none; }\n    @media (max-width: 640px) {\n      .rail, .rail-resize { display: none; }\n    }\n    /* User-driven show/hide (the TweaksPanel toggle) slides instead of\n       popping. Transitions are gated on :host([data-rail-anim]) \u2014 set only\n       for the 200ms around the toggle \u2014 so window-resize and rail-width\n       drag (which also call _fit) don't lag behind the cursor. */\n    .rail[data-user-hidden] { transform: translateX(-100%); }\n    :host([data-rail-anim]) .rail { transition: transform 200ms cubic-bezier(.3,.7,.4,1); }\n    :host([data-rail-anim]) .stage { transition: left 200ms cubic-bezier(.3,.7,.4,1); }\n    :host([data-rail-anim]) .canvas { transition: transform 200ms cubic-bezier(.3,.7,.4,1); }\n    /* transition shorthand replaces rather than merges \u2014 repeat the base\n       .overlay opacity/transform/filter transitions so visibility changes\n       during the 200ms toggle window still fade instead of popping. */\n    :host([data-rail-anim]) .overlay {\n      transition: margin-left 200ms cubic-bezier(.3,.7,.4,1),\n                  opacity 260ms ease,\n                  transform 260ms cubic-bezier(.2,.8,.2,1),\n                  filter 260ms ease;\n    }\n\n    .thumb {\n      position: relative;\n      display: flex;\n      align-items: flex-start;\n      gap: 8px;\n      cursor: pointer;\n      user-select: none;\n    }\n    .thumb .num {\n      width: 16px;\n      flex-shrink: 0;\n      font-size: 11px;\n      font-weight: 500;\n      text-align: right;\n      color: rgba(255,255,255,0.55);\n      padding-top: 2px;\n      font-variant-numeric: tabular-nums;\n    }\n    .thumb .frame {\n      position: relative;\n      flex: 1;\n      min-width: 0;\n      aspect-ratio: var(--deck-aspect);\n      background: #fff;\n      border-radius: 4px;\n      outline: 2px solid transparent;\n      outline-offset: 0;\n      overflow: hidden;\n      transition: outline-color 120ms ease;\n    }\n    .thumb:hover .frame { outline-color: rgba(255,255,255,0.25); }\n    .thumb { outline: none; }\n    .thumb:focus-visible .frame { outline-color: rgba(255,255,255,0.5); }\n    .thumb[data-current] .num { color: #fff; }\n    .thumb[data-current] .frame { outline-color: #D97757; }\n    .thumb[data-dragging] { opacity: 0.35; }\n    .thumb::before {\n      content: '';\n      position: absolute;\n      left: 24px;\n      right: 0;\n      height: 3px;\n      border-radius: 2px;\n      background: #D97757;\n      opacity: 0;\n      pointer-events: none;\n    }\n    .thumb[data-drop=\"before\"]::before { top: -8px; opacity: 1; }\n    .thumb[data-drop=\"after\"]::before { bottom: -8px; opacity: 1; }\n    .thumb[data-skip] .frame { opacity: 0.35; }\n    .thumb[data-skip] .frame::after {\n      content: 'Skipped';\n      position: absolute;\n      inset: 0;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      background: rgba(0,0,0,0.45);\n      color: #fff;\n      font-size: 10px;\n      font-weight: 500;\n      letter-spacing: 0.04em;\n    }\n\n    .ctxmenu {\n      position: fixed;\n      min-width: 150px;\n      padding: 4px;\n      background: #242424;\n      border: 1px solid rgba(255,255,255,0.12);\n      border-radius: 7px;\n      box-shadow: 0 8px 24px rgba(0,0,0,0.45);\n      z-index: 2147483100;\n      display: none;\n      font-size: 12px;\n    }\n    .ctxmenu[data-open] { display: block; }\n    .ctxmenu button {\n      display: block;\n      width: 100%;\n      appearance: none;\n      border: 0;\n      background
