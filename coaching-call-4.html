ter;\n  transform: skewX(-8deg);\n}\n.flow .node > span { transform: skewX(8deg); display: inline-block; }\n.flow .arrow {\n  flex: 0 0 auto;\n  width: 56px;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--accent-light);\n  font-family: var(--mono);\n  font-size: 36px;\n}\n.flow .node.bold {\n  background: color-mix(in oklch, var(--accent) 30%, transparent);\n  border-color: var(--accent-light);\n  box-shadow: 0 0 30px color-mix(in oklch, var(--accent) 40%, transparent);\n}\n\n/* Vertical flow \u2014 used on Journey */\n.flow-v {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  width: 100%;\n  max-width: 1400px;\n}\n.flow-v .row {\n  display: flex;\n  gap: 16px;\n  align-items: stretch;\n  flex-wrap: wrap;\n  justify-content: center;\n}\n\n/* ============================================================\n   Three pillars\n   ============================================================ */\n\n.pillars {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 32px;\n  width: 100%;\n  margin-top: 20px;\n}\n.pillar {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  padding: 56px 44px;\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  min-height: 480px;\n  position: relative;\n  overflow: hidden;\n}\n.pillar .p-num {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.pillar .p-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.pillar .p-desc {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n  margin-top: 12px;\n}\n.pillar .p-star {\n  position: absolute;\n  top: 44px;\n  right: 44px;\n  width: 48px;\n  height: 48px;\n  color: var(--accent-light);\n  opacity: 0.85;\n  filter: drop-shadow(0 0 14px color-mix(in oklch, var(--accent) 60%, transparent));\n}\n\n/* ============================================================\n   Calls schedule\n   ============================================================ */\n.cal-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 36px;\n  width: 100%;\n}\n.cal-day {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 6%, transparent);\n  padding: 48px 40px 40px;\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  text-align: center;\n  position: relative;\n}\n.cal-day .cal-dow {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.36em;\n  color: var(--accent-light);\n}\n.cal-day .cal-name {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 96px;\n  line-height: 1;\n  letter-spacing: -0.015em;\n  color: #fff;\n  text-transform: uppercase;\n}\n.cal-day .cal-time {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  padding-top: 20px;\n  border-top: 1px solid var(--rule);\n}\n.cal-day .cal-tz {\n  display: flex;\n  justify-content: space-between;\n  font-family: var(--mono);\n  font-size: 26px;\n  color: var(--ink-dim);\n  letter-spacing: 0.08em;\n}\n.cal-day .cal-tz b {\n  color: var(--ink-mute);\n  font-weight: 500;\n  letter-spacing: 0.24em;\n  font-size: 24px;\n  text-transform: uppercase;\n  align-self: center;\n}\n\n/* ============================================================\n   Curriculum (5 weeks)\n   ============================================================ */\n.weeks {\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n  width: 100%;\n  border-top: 1px solid var(--rule);\n}\n.week-row {\n  display: grid;\n  grid-template-columns: 200px 280px 1fr;\n  gap: 40px;\n  padding: 28px 0;\n  align-items: center;\n  border-bottom: 1px solid var(--rule);\n}\n.week-row > .aiw-icon {\n  justify-self: center;\n}\n.week-row .w-n {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.week-row .w-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.week-row .w-topics {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n  letter-spacing: 0.005em;\n}\n\n/* ============================================================\n   Quote / Statement\n   ============================================================ */\n.statement {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 136px;\n  line-height: 1;\n  letter-spacing: -0.015em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-wrap: balance;\n}\n.statement em {\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 60%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n\n/* ============================================================\n   Tag / Pill\n   ============================================================ */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 14px;\n  padding: 16px 28px 16px 24px;\n  border: 1px solid color-mix(in oklch, var(--accent) 50%, transparent);\n  background: color-mix(in oklch, var(--accent) 12%, transparent);\n  border-radius: 999px;\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 500;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n}\n.pill .dot { display: none; }\n\n/* ============================================================\n   Section divider \u2014 big stamped section title\n   ============================================================ */\n.section-divider {\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 100%,\n      #141414 0%,\n      #050505 60%),\n    #050505;\n}\n.section-divider .sd-wrap {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column;\n  align-items: center; justify-content: center;\n  gap: 40px;\n  z-index: 10;\n  text-align: center;\n  padding: 0 120px;\n}\n.section-divider .sd-chapter {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: 0.6em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  display: inline-flex; align-items: center; gap: 18px;\n}\n.section-divider .sd-chapter .dot { display: none; }\n.section-divider .sd-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 280px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-shadow: 0 8px 40px rgba(0,0,0,0.6);\n}\n\n/* ============================================================\n   Cover (slide 1) \u2014 stamped WELCOME\n   ============================================================ */\n.cover-slide {\n  background:\n    radial-gradient(ellipse 80% 60% at 50% 100%,\n      #141414 0%,\n      #050505 60%),\n    #050505;\n}\n.cover-slide .cv-wrap {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 18px;\n  z-index: 10;\n  text-align: center;\n  padding: 0 100px;\n}\n.cover-slide .cv-eyebrow {\n  font-family: var(--mono);\n  font-size: 28px;\n  letter-spacing: 0.52em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  display: inline-flex; align-items: center; gap: 18px;\n  margin-bottom: 18px;\n}\n.cover-slide .cv-eyebrow .dot { display: none; }\n.cover-slide .cv-welcome {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 420px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-shadow: 0 8px 40px rgba(0,0,0,0.6);\n}\n.cover-slide .cv-to {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 64px;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n  margin-top: 4px;\n}\n.cover-slide .cv-mark {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  margin-top: 26px;\n}\n.cover-slide .cv-mark img {\n  height: 220px;\n  width: auto;\n}\n.cover-slide .cv-tag {\n  font-family: var(--mono);\n  font-size: 26px;\n  letter-spacing: 0.42em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n  margin-top: 26px;\n}\n.cover-slide .cv-rule {\n  width: 720px;\n  display: flex; align-items: center; gap: 22px;\n  color: var(--accent);\n}\n.cover-slide .cv-rule span {\n  flex: 1; height: 3px;\n  background: linear-gradient(90deg, transparent, currentColor 50%, transparent);\n  transform: skewX(-12deg);\n}\n.cover-slide .cv-star {\n  flex: 0 0 auto; width: 56px; height: 56px;\n  color: var(--accent-light);\n  filter: drop-shadow(0 0 14px color-mix(in oklch, var(--accent) 70%, transparent));\n}\n\n/* ============================================================\n   Intro slide \u2014 Dean portrait\n   ============================================================ */\n.intro-slide .intro-stage {\n  position: absolute;\n  top: 0; right: 0; bottom: 0;\n  width: 52%;\n  overflow: hidden;\n  z-index: 4;\n}\n.intro-slide .intro-stage::after {\n  content: '';\n  position: absolute; inset: 0;\n  background: linear-gradient(90deg,\n    var(--bg-deep) 0%,\n    transparent 30%,\n    transparent 70%,\n    rgba(0,0,0,0.4) 100%);\n  pointer-events: none;\n}\n.intro-slide .intro-portrait {\n  position: absolute;\n  inset: 0;\n  width: 100%; height: 100%;\n  object-fit: cover;\n  object-position: 50% 18%;\n}\n.intro-slide .intro-left {\n  position: absolute;\n  top: 0; left: 0; bottom: 0;\n  width: 56%;\n  z-index: 10;\n  padding: 220px 80px 160px 220px;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  gap: 32px;\n}\n\n/* ============================================================\n   Goal slide \u2014 arrow $10k -> $100k\n   ============================================================ */\n.goal-arrow {\n  display: flex;\n  align-items: center;\n  gap: 60px;\n  margin: 20px 0;\n}\n.goal-arrow .amt {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 220px;\n  line-height: 1;\n  letter-spacing: -0.03em;\n  text-shadow: 0 8px 30px rgba(0,0,0,0.6);\n}\n.goal-arrow .amt-from { color: #fff; }\n.goal-arrow .amt-to {\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 50%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  -webkit-text-stroke: 2px #fff;\n  paint-order: stroke fill;\n  filter: drop-shadow(0 0 18px color-mix(in oklch, var(--accent-light) 60%, transparent));\n}\n.goal-arrow .arrow {\n  font-family: var(--mono);\n  font-size: 120px;\n  color: var(--accent-light);\n  line-height: 0.9;\n}\n.goal-per {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 56px;\n  color: var(--ink-dim);\n  letter-spacing: 0.04em;\n  text-transform: uppercase;\n}\n.goal-trio {\n  display: flex;\n  gap: 80px;\n  margin-top: 30px;\n}\n.goal-trio .gt {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 72px;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n}\n.goal-trio .gt:nth-child(1) { color: #fff; }\n.goal-trio .gt:nth-child(2) { color: var(--accent-light); }\n.goal-trio .gt:nth-child(3) { color: var(--ink-dim); }\n\n/* ============================================================\n   Truth pair\n   ============================================================ */\n.truth-pair {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 60px;\n  width: 100%;\n  margin-top: 20px;\n}\n.truth-pair .tp {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 6%, transparent);\n  padding: 64px 56px;\n  display: flex;\n  flex-direction: column;\n  gap: 24px;\n  min-height: 360px;\n}\n.truth-pair .tp .n {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 200px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 60%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.truth-pair .tp .t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 88px;\n  line-height: 0.95;\n  letter-spacing: -0.01em;\n  text-transform: uppercase;\n  color: #fff;\n  margin-top: auto;\n}\n\n/* ============================================================\n   Mindset bullet list\n   ============================================================ */\n.mindset {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n  margin: 0;\n  padding: 0;\n  list-style: none;\n  width: 100%;\n  max-width: 1280px;\n}\n.mindset li {\n  display: flex;\n  align-items: baseline;\n  gap: 24px;\n  padding-bottom: 24px;\n  border-bottom: 1px solid var(--rule);\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 42px;\n  line-height: 1.15;\n  letter-spacing: 0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.mindset li::before {\n  content: '\u2726';\n  color: var(--accent-light);\n  font-size: 24px;\n  flex-shrink: 0;\n  filter: drop-shadow(0 0 6px color-mix(in oklch, var(--accent) 80%, transparent));\n}\n.mindset li em {\n  color: var(--accent-light);\n}\n\n/* ============================================================\n   \"Set yourself up\" question card\n   ============================================================ */\n.sus-card {\n  display: flex;\n  flex-direction: column;\n  gap: 56px;\n  width: 100%;\n  max-width: 1400px;\n}\n.sus-card .q-mark {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 320px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 50%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n}\n.sus-card .q {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 116px;\n  line-height: 1.02;\n  letter-spacing: -0.015em;\n  text-transform: uppercase;\n  color: #fff;\n  margin: 0;\n  text-wrap: balance;\n}\n.sus-card .a {\n  font-family: var(--display);\n  font-weight: 600;\n  font-size: 42px;\n  line-height: 1.3;\n  letter-spacing: 0.01em;\n  color: var(--accent-light);\n  margin-top: 8px;\n}\n\n/* ============================================================\n   Vision flow with icon nodes\n   ============================================================ */\n.vision-flow {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 24px;\n  width: 100%;\n  margin-top: 16px;\n}\n.vf-step {\n  display: flex;\n  flex-direction: column;\n  gap: 14px;\n  padding: 32px 24px;\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  position: relative;\n  min-height: 280px;\n}\n.vf-step .vf-n {\n  font-family: var(--mono);\n  font-size: 24px;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.vf-step .vf-t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 38px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.vf-step .vf-d {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.35;\n  color: var(--ink-dim);\n  margin-top: auto;\n}\n.vision-flow .arr {\n  position: absolute;\n  right: -16px;\n  top: 50%;\n  transform: translateY(-50%);\n  color: var(--accent-light);\n  font-family: var(--mono);\n  font-size: 28px;\n  z-index: 2;\n  background: var(--bg-deep);\n  padding: 0 4px;\n}\n\n/* ============================================================\n   Manual vs AI split\n   ============================================================ */\n.versus {\n  display: grid;\n  grid-template-columns: 1fr auto 1fr;\n  align-items: stretch;\n  gap: 40px;\n  width: 100%;\n  margin-top: 20px;\n}\n.versus .col {\n  padding: 48px 44px;\n  border: 1px solid var(--rule);\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  min-height: 380px;\n}\n.versus .col.old {\n  background: color-mix(in oklch, oklch(0.18 0.005 80) 80%, transparent);\n}\n.versus .col.new {\n  background: color-mix(in oklch, var(--accent) 12%, transparent);\n  border-color: var(--accent);\n}\n.versus .col .vs-label {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 700;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n}\n.versus .col.old .vs-label { color: var(--ink-mute); }\n.versus .col.new .vs-label { color: var(--accent-light); }\n.versus .col .vs-h {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n}\n.versus .col.old .vs-h { color: var(--ink-dim); text-decoration: line-through; text-decoration-color: color-mix(in oklch, var(--accent) 50%, transparent); text-decoration-thickness: 4px; }\n.versus .col.new .vs-h { color: #fff; }\n.versus .col .vs-d {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.4;\n  margin-top: auto;\n}\n.versus .col.old .vs-d { color: var(--ink-mute); }\n.versus .col.new .vs-d { color: var(--ink-dim); }\n.versus .div {\n  display: flex; align-items: center; justify-content: center;\n  font-family: var(--hero);\n  font-weight: 900; font-size: 64px;\n  color: var(--accent-light);\n}\n\n/* ============================================================\n   Faster One numeric (final slide)\n   ============================================================ */\n.faster-num {\n  font-family: var(--faster);\n  font-size: 280px;\n  line-height: 1;\n  color: var(--accent-light);\n  letter-spacing: -0.02em;\n  text-shadow: 0 6px 30px rgba(0,0,0,0.6);\n}\n\n/* ============================================================\n   Helpers\n   ============================================================ */\n.mute { color: var(--ink-mute); }\n.dim  { color: var(--ink-dim); }\n.acc  { color: var(--accent-light); }\n\n/* ============================================================\n   Title-card rails (slide 01, slide 06)\n   ============================================================ */\n.rail {\n  position: absolute;\n  left: 80px;\n  right: 80px;\n  z-index: 50;\n  display: flex;\n  align-items: center;\n  gap: 28px;\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.rail-top { top: 68px; }\n.rail-bottom { bottom: 68px; }\n.rail .rail-line {\n  flex: 1;\n  height: 1px;\n  background: linear-gradient(90deg,\n    color-mix(in oklch, var(--ink-mute) 60%, transparent),\n    color-mix(in oklch, var(--accent) 60%, transparent),\n    color-mix(in oklch, var(--ink-mute) 60%, transparent));\n}\n\n/* ============================================================\n   Welcome hero (slide 01)\n   ============================================================ */\n.welcome-hero {\n  position: absolute;\n  inset: 0;\n  display: grid;\n  grid-template-columns: 1.1fr 1fr;\n  align-items: center;\n  padding: 0 200px;\n  gap: 80px;\n  z-index: 10;\n}\n.welcome-stack {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n}\n.welcome-eyebrow {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: 0.42em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n}\n.welcome-title {\n  margin: 0;\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n}\n.welcome-title .wt-line {\n  display: block;\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 280px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.welcome-title .wt-line-2 {\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 75%, #fff) 35%,\n    var(--accent) 70%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  filter:\n    drop-shadow(2px 2px 0 color-mix(in oklch, var(--accent) 50%, #000))\n    drop-shadow(6px 6px 0 color-mix(in oklch, var(--accent) 35%, #000))\n    drop-shadow(12px 12px 0 color-mix(in oklch, var(--accent-deep) 50%, #000));\n}\n.welcome-mark {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  position: relative;\n}\n.welcome-mark::before {\n  content: '';\n  position: absolute;\n  width: 560px;\n  height: 560px;\n  border-radius: 50%;\n  background: radial-gradient(circle at 50% 50%,\n    color-mix(in oklch, var(--accent) 35%, transparent) 0%,\n    color-mix(in oklch, var(--accent-deep) 15%, transparent) 40%,\n    transparent 70%);\n  z-index: 0;\n}\n.welcome-mark img {\n  height: 480px;\n  width: auto;\n  position: relative;\n  z-index: 1;\n  filter: drop-shadow(0 12px 40px rgba(0,0,0,0.55));\n}\n\n/* ============================================================\n   Goal slide v2 \u2014 single, clear composition\n   ============================================================ */\n.goal-v2 {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  padding: 140px 140px;\n  gap: 32px;\n  z-index: 10;\n  text-align: center;\n}\n.g2-eyebrow {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 600;\n  letter-spacing: 0.52em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n}\n.g2-headline {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 60px;\n}\n.g2-from {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 220px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  color: var(--ink-dim);\n  text-decoration-thickness: 6px;\n}\n.g2-to {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 280px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 80%, #fff) 40%,\n    var(--accent) 80%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  -webkit-text-stroke: 2px #fff;\n  paint-order: stroke fill;\n  filter: drop-shadow(0 0 30px color-mix(in oklch, var(--accent) 50%, transparent));\n}\n.g2-arrow {\n  width: 140px;\n  height: 70px;\n  flex: 0 0 auto;\n}\n.g2-per {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 48px;\n  line-height: 1;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n  margin-top: -8px;\n}\n\n.g2-divider {\n  display: flex;\n  align-items: center;\n  gap: 28px;\n  width: 100%;\n  max-width: 1100px;\n  margin-top: 24px;\n}\n.g2-divider span {\n  flex: 1;\n  height: 1px;\n  background: linear-gradient(90deg,\n    transparent,\n    color-mix(in oklch, var(--accent) 60%, var(--ink-mute)) 50%,\n    transparent);\n}\n.g2-divider em {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  font-style: normal;\n}\n\n.g2-trio {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 48px;\n  width: 100%;\n  max-width: 1500px;\n  margin-top: 8px;\n}\n.g2-pillar {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 12px;\n  padding: 28px 12px;\n  border-top: 1px solid color-mix(in oklch, var(--accent) 50%, var(--rule));\n  position: relative;\n}\n.g2-pillar::before {\n  content: '';\n  position: absolute;\n  top: -5px;\n  left: 50%;\n  transform: translateX(-50%);\n  width: 9px;\n  height: 9px;\n  background: var(--accent-light);\n  border-radius: 50%;\n  box-shadow: 0 0 12px var(--accent);\n}\n.g2-p-word {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 88px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.g2-p-line {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.35;\n  color: var(--ink-dim);\n  max-width: 380px;\n  text-wrap: pretty;\n}\n.goal-stage {\n  position: absolute;\n  inset: 0;\n  display: flex;\n  flex-direction: column;\n  justify-content: center;\n  padding: 170px 140px 160px;\n  gap: 80px;\n  z-index: 10;\n}\n\n.goal-ladder {\n  display: grid;\n  grid-template-columns: 0.75fr 1.2fr 1.05fr;\n  align-items: end;\n  gap: 0;\n}\n.goal-ladder .rung {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n.goal-ladder .rung-from { align-items: flex-start; }\n.goal-ladder .rung-to {\n  align-items: flex-end;\n  text-align: right;\n}\n.goal-ladder .rung-tag {\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: 0.4em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.goal-ladder .rung-to .rung-tag { color: var(--accent-light); }\n.goal-ladder .rung-amt {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 180px;\n  line-height: 1;\n  letter-spacing: -0.025em;\n  color: var(--ink-dim);\n}\n.goal-ladder .rung-amt-big {\n  font-size: 240px;\n  line-height: 1;\n  background: linear-gradient(180deg,\n    #ffffff 0%,\n    color-mix(in oklch, var(--accent-light) 80%, #fff) 35%,\n    var(--accent) 75%,\n    var(--accent-deep) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  -webkit-text-stroke: 2px #fff;\n  paint-order: stroke fill;\n  filter: drop-shadow(0 0 32px color-mix(in oklch, var(--accent) 50%, transparent));\n}\n.goal-ladder .rung-meta {\n  font-family: var(--mono);\n  font-size: 28px;\n  font-weight: 500;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.goal-ladder .rung-bridge {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: flex-end;\n  padding-bottom: 100px;\n  gap: 14px;\n}\n.goal-ladder .bridge-label {\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 600;\n  letter-spacing: 0.32em;\n  text-transform: uppercase;\n  color: var(--accent-light);\n  white-space: nowrap;\n}\n.goal-ladder .bridge-svg {\n  width: 100%;\n  height: 60px;\n  display: block;\n}\n\n.goal-outcomes {\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n}\n.goal-outcomes .oc-head {\n  font-family: var(--hero);\n  font-weight: 800;\n  font-size: 36px;\n  letter-spacing: 0.02em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n}\n.goal-outcomes .oc-grid {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 28px;\n}\n.oc-card {\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  padding: 28px 32px;\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n  position: relative;\n  overflow: hidden;\n}\n.oc-card::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 3px;\n  background: var(--accent-light);\n}\n.oc-card .oc-n {\n  font-family: var(--mono);\n  font-size: 24px;\n  font-weight: 700;\n  letter-spacing: 0.32em;\n  color: var(--accent-light);\n}\n.oc-card .oc-t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 64px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.oc-card .oc-d {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 24px;\n  line-height: 1.35;\n  color: var(--ink-dim);\n  margin-top: 4px;\n}\n\n/* ============================================================\n   Module rows (slide 23) \u2014 lesson-list style\n   ============================================================ */\n.modules {\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n  width: 100%;\n}\n.module-row {\n  display: grid;\n  grid-template-columns: 200px 1fr auto 80px;\n  gap: 40px;\n  align-items: center;\n  padding: 28px 40px 28px 32px;\n  border: 1px solid var(--rule);\n  background: color-mix(in oklch, var(--accent) 5%, transparent);\n  text-decoration: none;\n  position: relative;\n  overflow: hidden;\n  transition: background .25s ease, border-color .25s ease;\n}\n.module-row::before {\n  content: '';\n  position: absolute;\n  left: 0; top: 0; bottom: 0;\n  width: 4px;\n  background: var(--accent-light);\n  box-shadow: 0 0 18px color-mix(in oklch, var(--accent) 70%, transparent);\n}\n.module-row .m-n {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 120px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n  background: linear-gradient(180deg, #fff 0%, var(--accent-light) 55%, var(--accent) 100%);\n  -webkit-background-clip: text;\n  background-clip: text;\n  color: transparent;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  text-align: center;\n}\n.module-row .m-body {\n  display: flex;\n  flex-direction: column;\n  gap: 6px;\n}\n.module-row .m-label {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  color: var(--accent-light);\n  text-transform: uppercase;\n}\n.module-row .m-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 56px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #fff;\n}\n.module-row .m-meta {\n  font-family: var(--mono);\n  font-size: 26px;\n  font-weight: 500;\n  letter-spacing: 0.28em;\n  text-transform: uppercase;\n  color: var(--ink-dim);\n}\n.module-row .m-cta {\n  width: 72px;\n  height: 72px;\n  border: 2px solid var(--accent);\n  background: color-mix(in oklch, var(--accent) 18%, transparent);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--accent-light);\n  box-shadow: 0 0 24px color-mix(in oklch, var(--accent) 30%, transparent);\n}\n.module-row .m-cta svg {\n  width: 28px;\n  height: 28px;\n  margin-left: 4px;\n}\n\n\n/* ============================================================\n   BOLT OVERRIDES\n   Big hero typography stays white. Yellow is reserved for small\n   accents: eyebrows, dots, dividers, sparkles, stars, in-headline\n   emphasis words, and a single yellow chisel offset behind big\n   numerals/stamped words.\n   ============================================================ */\n\n/* Cover slide \u2014 \"to AIW.\" stamped white, dark chisel only (no yellow outline) */\n.welcome-title .wt-line-2 {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  filter:\n    drop-shadow(3px 3px 0 #1f1f1f)\n    drop-shadow(9px 9px 0 #141414)\n    drop-shadow(16px 16px 0 #0a0a0a)\n    drop-shadow(22px 22px 26px rgba(0, 0, 0, 0.6));\n}\n.welcome-mark::before {\n  background: radial-gradient(circle at 50% 50%,\n    oklch(0.90 0.19 96 / 0.18) 0%,\n    oklch(0.90 0.19 96 / 0.08) 40%,\n    transparent 70%);\n}\n\n/* Section divider \u2014 flat white title */\n.section-divider .sd-title {\n  color: #ffffff;\n  text-shadow:\n    3px 3px 0 oklch(0.90 0.19 96 / 0.55),\n    0 8px 40px rgba(0,0,0,0.6);\n}\n\n/* In-headline emphasis words \u2014 flat yellow (small accent volume) */\n.h-hero em.accent,\n.h-display em.accent,\n.h-big em.accent,\n.h-med em.accent,\n.statement em.accent,\n.statement em,\n.sd-title em.accent,\n.sus-card .q em.accent {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: oklch(0.90 0.19 96);\n  color: oklch(0.90 0.19 96);\n  filter: none;\n}\n\n/* Subtitles \u2014 lightning yellow per teammate review */\n.sub {\n  color: oklch(0.90 0.19 96);\n}\n\n/* Set-Up answer cards (slides 20/21/22) \u2014 white, not yellow */\n.sus-card .a {\n  color: #ffffff;\n}\n\n/* Large numerals (steps, module rows, truth pair, sus q-mark)\n   \u2192 pure white with a single yellow chisel offset for character */\n.steps .n,\n.module-row .m-n,\n.truth-pair .tp .n,\n.sus-card .q-mark,\n.accent-grad {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  text-shadow:\n    4px 4px 0 oklch(0.90 0.19 96 / 0.55),\n    0 4px 12px rgba(0, 0, 0, 0.5);\n}\n\n/* \"Sell.\" \"Multiply.\" stamped words on slide 16 \u2192 white, dark chisel only */\n.chisel {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  filter:\n    drop-shadow(4px 4px 0 #1f1f1f)\n    drop-shadow(10px 10px 0 #141414)\n    drop-shadow(18px 18px 0 #0a0a0a);\n}\n\n/* $5 / $15 / $1 cohort stats \u2014 override the inline gradient to white + yellow shadow.\n   Inline styles override class rules, but text-fill is set on the inline. We use a\n   selector specific enough to win without !important by setting the gradient to none. */\n.layout-center [style*=\"background:linear-gradient\"][style*=\"-webkit-background-clip\"] {\n  /* fall-through \u2014 kept for any inline gradient bits, they'll go yellow which is fine */\n}\n\n/* Calendar day names \u2014 pure white */\n.cal-day .cal-name { color: #ffffff; }\n\n/* Faster One numeric (if used) \u2014 white with yellow glow */\n.faster-num {\n  color: #ffffff;\n  text-shadow:\n    3px 3px 0 oklch(0.90 0.19 96 / 0.5),\n    0 6px 30px rgba(0,0,0,0.6);\n}\n\n/* Star sparkles \u2014 yellow halo */\n.stars-bg {\n  filter: drop-shadow(0 0 6px oklch(0.90 0.19 96 / 0.6));\n}\n\n/* Goal slide \u2014 $100K becomes white with a single yellow chisel kiss */\n.g2-to {\n  background: none;\n  -webkit-background-clip: initial;\n  background-clip: initial;\n  -webkit-text-fill-color: #ffffff;\n  color: #ffffff;\n  -webkit-text-stroke: 0;\n  filter:\n    drop-shadow(4px 4px 0 oklch(0.90 0.19 96))\n    drop-shadow(10px 10px 0 #181818)\n    drop-shadow(18px 18px 0 #0e0e0e)\n    drop-shadow(24px 24px 30px rgba(0, 0, 0, 0.6));\n}\n.g2-from { color: oklch(0.55 0.008 80); }\n\n/* Cards / boxes \u2014 strip the (now-yellow) accent tint from large surfaces,\n   leave only thin yellow edges and small chips */\n.checklist li,\n.pillar,\n.cal-day,\n.weeks .week-row,\n.vf-step,\n.truth-pair .tp,\n.oc-card,\n.module-row {\n  background: rgba(255, 255, 255, 0.02);\n}\n.flow .node {\n  background: rgba(255, 255, 255, 0.03);\n  border-color: oklch(0.30 0.005 80);\n}\n.flow .node.bold {\n  background: oklch(0.90 0.19 96 / 0.14);\n  border-color: oklch(0.90 0.19 96);\n  box-shadow: 0 0 30px oklch(0.90 0.19 96 / 0.30);\n}\n.versus .col.new {\n  background: oklch(0.90 0.19 96 / 0.10);\n}\n.pill {\n  background: oklch(0.90 0.19 96 / 0.08);\n  border-color: oklch(0.90 0.19 96 / 0.45);\n}\n.module-row .m-cta {\n  background: oklch(0.90 0.19 96 / 0.14);\n}\n\n/* Vision flow arrow background \u2014 match the new neutral card */\n.vision-flow .arr {\n  background: #050505;\n}\n\n/* Mindset bullets star \u2014 already accent-light (yellow) \u2713 */\n/* Pillar stars \u2014 already accent-light (yellow) \u2713 */\n\n/* \"We're really after\" rule line on goal slide */\n.g2-divider span {\n  background: linear-gradient(90deg,\n    transparent,\n    oklch(0.90 0.19 96 / 0.65) 50%,\n    transparent);\n}\n\n/* Rail lines on cover slide */\n.rail .rail-line {\n  background: linear-gradient(90deg,\n    color-mix(in oklch, var(--ink-mute) 60%, transparent),\n    oklch(0.90 0.19 96 / 0.55),\n    color-mix(in oklch, var(--ink-mute) 60%, transparent));\n}\n\n/* Goal headline arrow svg \u2014 repaint stroke + fill yellow */\n.g2-arrow line { stroke: oklch(0.90 0.19 96) !important; }\n.g2-arrow path { fill:   oklch(0.90 0.19 96) !important; }\n\n/* The arrow \u2192 on Set-Up slides (inline color) \u2014 already var(--accent-light) \u2713 */\n\n/* Pillar accent border-left on .oc-card and .module-row remains yellow \u2713 */\n\n\n/* ============================================================\n   YELLOW REDUCTION PASS \u2014 80% less yellow.\n   accent-light = white now. This block clears the remaining yellow\n   that comes from color-mix backgrounds and direct accent uses on\n   large surfaces, leaving yellow only on truly small accents:\n   - eyebrow dot\n   - .bolt-icon (lightning bolt SVG)\n   - .sub subtitle accent line\n   - one em.accent kiss per slide\n   ============================================================ */\n\n/* Strip yellow from card backgrounds */\n.checklist li,\n.pillar,\n.cal-day,\n.weeks .week-row,\n.vf-step,\n.truth-pair .tp,\n.oc-card,\n.module-row,\n.sus-card {\n  background: rgba(255,255,255,0.025) !important;\n  border-color: oklch(0.20 0.005 80) !important;\n}\n.oc-card::before,\n.module-row::before {\n  background: rgba(255,255,255,0.5) !important;\n  box-shadow: none !important;\n}\n\n/* Pills become subtle white */\n.pill {\n  background: rgba(255,255,255,0.05) !important;\n  border-color: rgba(255,255,255,0.18) !important;\n  color: var(--ink-dim) !important;\n}\n.pill .dot {\n  background: rgba(255,255,255,0.4) !important;\n}\n\n/* Rules/dividers become subtle white */\n.statement .stmt-rule,\n.g2-divider span,\n.h-pad {\n  background: linear-gradient(90deg,\n    transparent,\n    rgba(255,255,255,0.18) 50%,\n    transparent) !important;\n}\n\n/* Module row CTA \u2014 subtle, not yellow */\n.module-row .m-cta {\n  background: rgba(255,255,255,0.06) !important;\n  border-color: rgba(255,255,255,0.25) !important;\n  box-shadow: none !important;\n  color: #ffffff !important;\n}\n\n/* Flow node \"bold\" \u2014 subtle highlight, no yellow halo */\n.flow .node.bold {\n  background: rgba(255,255,255,0.06) !important;\n  border-color: rgba(255,255,255,0.3) !important;\n  box-shadow: none !important;\n}\n.versus .col.new {\n  background: rgba(255,255,255,0.04) !important;\n}\n\n/* Strip yellow from stars/sparkle filters */\n.stars-bg {\n  filter: drop-shadow(0 0 4px rgba(255,255,255,0.35)) !important;\n}\n\n/* Reduce yellow drop-shadow chisel on big numerals to dark-only */\n.steps .n,\n.module-row .m-n,\n.truth-pair .tp .n,\n.sus-card .q-mark,\n.accent-grad {\n  text-shadow:\n    3px 3px 0 #1a1a1a,\n    0 4px 12px rgba(0, 0, 0, 0.5) !important;\n}\n\n/* Goal hero $100K \u2014 dark chisel only */\n.g2-to {\n  filter:\n    drop-shadow(3px 3px 0 #1a1a1a)\n    drop-shadow(9px 9px 0 #0e0e0e)\n    drop-shadow(16px 16px 0 #050505)\n    drop-shadow(22px 22px 26px rgba(0, 0, 0, 0.6)) !important;\n}\n\n/* Subtitles: white with subtle yellow underline mark via ::before bolt */\n.sub {\n  color: var(--ink-dim) !important;\n}\n\n/* em.accent words \u2014 default to white. One designated per slide can re-yellow with .em-bolt */\n.h-hero em.accent,\n.h-display em.accent,\n.h-big em.accent,\n.h-med em.accent,\n.statement em.accent,\n.statement em,\n.sd-title em.accent,\n.sus-card .q em.accent,\n.gigo-quote em,\n.welcome-title em,\n.cc2-sub em {\n  color: #ffffff !important;\n  -webkit-text-fill-color: #ffffff !important;\n}\n\n/* Yellow-emphasis variant: only one or two per deck */\nem.em-bolt,\n.h-hero em.em-bolt,\n.h-big em.em-bolt,\n.statement em.em-bolt {\n  color: oklch(0.90 0.19 96) !important;\n  -webkit-text-fill-color: oklch(0.90 0.19 96) !important;\n}\n\n/* ============================================================\n   LIGHTNING BOLT ICON \u2014 the small intentional yellow accent\n   ============================================================ */\n.bolt-icon {\n  display: inline-block;\n  width: 1em;\n  height: 1.2em;\n  vertical-align: -0.2em;\n  color: oklch(0.90 0.19 96);\n  filter: drop-shadow(0 0 12px oklch(0.90 0.19 96 / 0.55));\n}\n.bolt-icon svg { width: 100%; height: 100%; display: block; }\n\n/* Inline bolt sized for eyebrow */\n.eyebrow .bolt-icon {\n  width: 22px; height: 28px;\n  margin-right: 2px;\n}\n\n/* ============================================================\n   MOTIF BACKGROUND LAYER\n   Big ghosted glyphs / words behind slide content, \u00e0 la AIW cover system\n   ============================================================ */\n.slide-motif {\n  position: absolute;\n  inset: 0;\n  z-index: 1;\n  pointer-events: none;\n  overflow: hidden;\n  color: #ffffff;\n}\n\n/* Motif: scattered question marks */\n.slide-motif.motif-qmark {\n  display: block;\n}\n.slide-motif.motif-qmark .qm {\n  position: absolute;\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  line-height: 0.85;\n  color: #ffffff;\n  opacity: 0.05;\n  user-select: none;\n}\n\n/* Motif: diagonal stripe words (build / proof / repeat etc) */\n.slide-motif.motif-stripes {\n  display: flex;\n  align-items: center;\n  justify-content: center;\n}\n.slide-motif.motif-stripes .ms-track {\n  position: absolute;\n  inset: -200px;\n  display: flex;\n  flex-direction: column;\n  gap: 30px;\n  transform: rotate(-22deg);\n  opacity: 0.04;\n}\n.slide-motif.motif-stripes .ms-row {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  font-size: 140px;\n  line-height: 1;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n  color: #ffffff;\n}\n\n/* Motif: scattered bolt glyphs */\n.slide-motif.motif-bolts {\n  display: block;\n}\n.slide-motif.motif-bolts .mb {\n  position: absolute;\n  opacity: 0.08;\n  color: #ffffff;\n}\n.slide-motif.motif-bolts .mb svg {\n  width: 100%; height: 100%; display: block;\n}\n\n/* Motif: numbered grid (01 02 03 ...) \u2014 for step/process slides */\n.slide-motif.motif-nums {\n  display: block;\n}\n.slide-motif.motif-nums .mn {\n  position: absolute;\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  font-size: 280px;\n  line-height: 0.85;\n  letter-spacing: -0.03em;\n  color: #ffffff;\n  opacity: 0.04;\n  user-select: none;\n}\n\n/* Motif: checkbox grid (for homework) */\n.slide-motif.motif-check {\n  display: block;\n}\n.slide-motif.motif-check .mc {\n  position: absolute;\n  width: 60px; height: 60px;\n  border: 3px solid #ffffff;\n  border-radius: 8px;\n  opacity: 0.05;\n}\n\n/* Motif: terminal-cursor lines (for code/factory) */\n.slide-motif.motif-term {\n  display: block;\n  font-family: var(--mono);\n}\n.slide-motif.motif-term .mt {\n  position: absolute;\n  font-size: 28px;\n  letter-spacing: 0.02em;\n  color: #ffffff;\n  opacity: 0.06;\n  white-space: nowrap;\n}\n\n/* Motif: calendar grid (for week slides) */\n.slide-motif.motif-cal {\n  display: block;\n}\n.slide-motif.motif-cal .mday {\n  position: absolute;\n  width: 180px; height: 180px;\n  border: 1px solid rgba(255,255,255,0.08);\n  opacity: 0.7;\n}\n\n/* Make sure slide content sits above motif */\n.slide > .layout-stack,\n.slide > .layout-center,\n.slide > .step-stage {\n  z-index: 6;\n}\n.slide > .stars-bg { z-index: 2; }\n.slide > .vignette { z-index: 7; }\n.slide > .grain { z-index: 8; }\n\n\n/* ============================================================\n   AIW ICON SYSTEM \u2014 pulled from the cover-icon set\n   Italic slant, solid fill, AIW sparkle DNA\n   ============================================================ */\n\n.aiw-icon {\n  display: inline-block;\n  width: 1em;\n  height: 1em;\n  vertical-align: middle;\n  color: #ffffff;\n  transform: skew(-10deg);\n  flex-shrink: 0;\n}\n.aiw-icon svg { width: 100%; height: 100%; display: block; }\n\n/* Standard sizes */\n.aiw-icon.sm  { width: 32px; height: 32px; }\n.aiw-icon.md  { width: 56px; height: 56px; }\n.aiw-icon.lg  { width: 96px; height: 96px; }\n.aiw-icon.xl  { width: 144px; height: 144px; }\n\n/* Yellow variant \u2014 use SPARINGLY, max one per slide */\n.aiw-icon.bolt { color: oklch(0.90 0.19 96); }\n\n/* Icon tile \u2014 for grids of icons (like the schedule, modules, machine nodes) */\n.icon-tile {\n  display: flex;\n  flex-direction: column;\n  align-items: flex-start;\n  gap: 18px;\n  padding: 32px;\n  border: 1px solid var(--rule);\n  background: rgba(255,255,255,0.025);\n  position: relative;\n}\n.icon-tile .aiw-icon {\n  width: 80px;\n  height: 80px;\n}\n.icon-tile .it-label {\n  font-family: var(--mono);\n  font-size: 22px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  text-transform: uppercase;\n  color: var(--ink-mute);\n}\n.icon-tile .it-title {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 44px;\n  line-height: 0.95;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #ffffff;\n}\n.icon-tile .it-desc {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 22px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n  margin-top: auto;\n}\n\n/* Even less yellow \u2014 make eyebrow dots white by default.\n   Slides that want the yellow can override per-instance. */\n.eyebrow .dot {\n  background: #ffffff !important;\n  box-shadow: 0 0 8px rgba(255,255,255,0.5) !important;\n}\n.eyebrow {\n  color: rgba(255,255,255,0.85) !important;\n}\n\n/* Steps/columns: when icons replace the numerals, swap the chisel for clean white */\n.icon-step {\n  display: flex;\n  flex-direction: column;\n  align-items: flex-start;\n  gap: 16px;\n}\n.icon-step .aiw-icon {\n  width: 96px;\n  height: 96px;\n  margin-bottom: 8px;\n}\n.icon-step .is-n {\n  font-family: var(--mono);\n  font-size: 20px;\n  font-weight: 600;\n  letter-spacing: 0.36em;\n  color: var(--ink-mute);\n}\n.icon-step .is-t {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-size: 38px;\n  line-height: 1;\n  letter-spacing: -0.005em;\n  text-transform: uppercase;\n  color: #ffffff;\n}\n.icon-step .is-d {\n  font-family: var(--display);\n  font-weight: 500;\n  font-size: 22px;\n  line-height: 1.4;\n  color: var(--ink-dim);\n}\n\n\n/* ============================================================\n   DECK COVER STRIPES \u2014 diagonal repeating-word motif\n   \u00e0 la the AIW live-call covers (WORKSHOP / Q&A / VALUE)\n   ============================================================ */\n.cover-stripes {\n  position: absolute;\n  inset: -200px;\n  display: flex;\n  flex-direction: column;\n  gap: 28px;\n  transform: rotate(-22deg);\n  opacity: 0.06;\n  z-index: 1;\n  pointer-events: none;\n  user-select: none;\n  overflow: hidden;\n}\n.cover-stripes .cs-row {\n  font-family: var(--hero);\n  font-weight: 900;\n  font-style: italic;\n  font-size: 160px;\n  line-height: 1;\n  letter-spacing: 0.02em;\n  white-space: nowrap;\n  color: #ffffff;\n}\n.cover-stripes .cs-row.dim {\n  opacity: 0.6;\n}\n\n\n/* Override: ensure pillar stars + gigo bullets are pure white, no yellow glow */\n.pillar .p-star {\n  color: #ffffff !important;\n  filter: none !important;\n  opacity: 1 !important;\n}\n.gigo-body ul li::before {\n  color: #ffffff !important;\n}\n\n<\u002Fstyle>\n\n<style>\n  /* ============================================================\n     Coaching Call 3 \u2014 slide-specific layouts\n     ============================================================ */\n\n  /* Two-column callout grid (slide 02, 13, 17) */\n  .two-up {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 56px;\n    width: 100%;\n  }\n  .callout {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 48px 44px;\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    min-height: 320px;\n  }\n  .callout.bolt {\n    background: oklch(0.90 0.19 96 / 0.07);\n    border-color: oklch(0.90 0.19 96 / 0.45);\n  }\n  .callout .co-label {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .callout .co-h {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 52px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n  }\n  .callout .co-body {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.45;\n    color: var(--ink-dim);\n    margin: 0;\n  }\n  .callout ul {\n    margin: 0; padding: 0; list-style: none;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .callout ul li {\n    font-family: var(--display);\n    font-weight: 800;\n    font-size: 24px;\n    line-height: 1.4;\n    color: #ffffff;\n    padding-left: 24px;\n    position: relative;\n  }\n  .callout ul li::before {\n    content: '';\n    position: absolute;\n    left: 0; top: 12px;\n    width: 14px; height: 3px;\n    background: #ffffff;\n  }\n\n  /* Image slot \u2014 the finished website mock */\n  .image-slot {\n    border: 1px solid var(--rule);\n    background:\n      repeating-linear-gradient(135deg,\n        rgba(255,255,255,0.025) 0px,\n        rgba(255,255,255,0.025) 18px,\n        transparent 18px,\n        transparent 36px),\n      rgba(255,255,255,0.015);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    position: relative;\n  }\n  .image-slot .is-label {\n    font-family: var(--mono);\n    font-size: 26px;\n    letter-spacing: 0.36em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n    text-align: center;\n    line-height: 1.6;\n  }\n  .image-slot .is-label b {\n    color: var(--accent);\n    font-weight: 500;\n    display: block;\n    margin-bottom: 6px;\n  }\n  .image-slot .is-corner {\n    position: absolute;\n    width: 22px; height: 22px;\n    border-color: oklch(0.90 0.19 96 / 0.5);\n    border-style: solid;\n    border-width: 0;\n  }\n  .image-slot .is-c-tl { top:0; left:0;   border-top-width: 2px; border-left-width: 2px; }\n  .image-slot .is-c-tr { top:0; right:0;  border-top-width: 2px; border-right-width: 2px; }\n  .image-slot .is-c-bl { bottom:0; left:0;border-bottom-width: 2px; border-left-width: 2px; }\n  .image-slot .is-c-br { bottom:0; right:0;border-bottom-width: 2px; border-right-width: 2px; }\n\n  /* Mini-flow with numbered chevrons (slide 04) */\n  .mini-flow {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 28px;\n    width: 100%;\n  }\n  .mini-flow .mf {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 36px 32px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    position: relative;\n    min-height: 260px;\n  }\n  .mini-flow .mf .mf-n {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 88px;\n    line-height: 0.9;\n    color: #ffffff;\n  }\n  .mini-flow .mf .mf-t {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 38px;\n    line-height: 1;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin-top: 4px;\n  }\n  .mini-flow .mf .mf-d {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    margin-top: auto;\n  }\n  .mini-flow .mf::after {\n    content: '\u2192';\n    position: absolute;\n    right: -22px;\n    top: 50%;\n    transform: translateY(-50%);\n    font-family: var(--mono);\n    font-size: 36px;\n    color: #ffffff;\n    background: #050505;\n    padding: 0 4px;\n    z-index: 2;\n  }\n  .mini-flow .mf:last-child::after { display: none; }\n\n  /* Big background-numeral for steps that use stack/center layouts */\n  .step-ghost {\n    position: absolute;\n    top: 80px;\n    right: 100px;\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 360px;\n    line-height: 0.85;\n    letter-spacing: -0.04em;\n    color: #ffffff;\n    opacity: 0.10;\n    user-select: none;\n    pointer-events: none;\n    z-index: 1;\n  }\n  .step-ghost.bottom-left {\n    top: auto;\n    right: auto;\n    bottom: 80px;\n    left: 100px;\n  }\n\n  /* Big stage step (slides 07-11) */\n  .step-stage {\n    position: absolute;\n    inset: 0;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 0;\n    z-index: 10;\n  }\n  .step-stage .ss-left {\n    padding: 200px 80px 160px 200px;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    gap: 32px;\n  }\n  .step-stage .ss-right {\n    padding: 200px 200px 160px 60px;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    gap: 24px;\n  }\n  .step-stage .ss-numeral {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 240px;\n    line-height: 0.85;\n    letter-spacing: -0.04em;\n    color: #ffffff;\n    text-shadow:\n      4px 4px 0 oklch(0.90 0.19 96 / 0.55),\n      0 6px 24px rgba(0,0,0,0.55);\n  }\n  .step-stage .ss-kicker {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .step-stage .ss-title {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 96px;\n    line-height: 0.95;\n    letter-spacing: -0.015em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n    text-wrap: balance;\n  }\n  .step-stage .ss-desc {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 26px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    max-width: 640px;\n  }\n  .step-stage .ss-list {\n    margin: 0; padding: 0; list-style: none;\n    display: flex; flex-direction: column;\n    gap: 0;\n    border-top: 1px solid var(--rule);\n  }\n  .step-stage .ss-list li {\n    padding: 22px 0;\n    border-bottom: 1px solid var(--rule);\n    font-family: var(--display);\n    font-weight: 600;\n    font-style: italic;\n    font-size: 30px;\n    letter-spacing: 0.005em;\n    color: #ffffff;\n    text-transform: uppercase;\n    display: flex;\n    align-items: baseline;\n    gap: 22px;\n  }\n  .step-stage .ss-list li::before {\n    content: '\u2726';\n    color: var(--accent);\n    font-size: 20px;\n    font-style: normal;\n  }\n  .step-stage .ss-list-label {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.4em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 6px;\n  }\n\n  /* Pipeline strip \u2014 slide 10 */\n  .pipeline {\n    display: flex;\n    width: 100%;\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n  }\n  .pipeline .pp {\n    flex: 1;\n    padding: 28px 22px;\n    border-right: 1px solid var(--rule);\n    display: flex;\n    flex-direction: column;\n    gap: 8px;\n    text-align: center;\n  }\n  .pipeline .pp:last-child { border-right: none; }\n  .pipeline .pp .pp-n {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.32em;\n    color: var(--accent);\n  }\n  .pipeline .pp .pp-t {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 42px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .pipeline .pp.head {\n    background: oklch(0.90 0.19 96 / 0.10);\n    border-right-color: oklch(0.90 0.19 96 / 0.45);\n  }\n  .pipeline .pp.head .pp-t { color: oklch(0.90 0.19 96); }\n\n  /* Whole machine \u2014 5 chained nodes */\n  .machine {\n    display: grid;\n    grid-template-columns: repeat(5, 1fr);\n    gap: 18px;\n    width: 100%;\n  }\n  .machine .mc {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 36px 24px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    text-align: center;\n    align-items: center;\n    justify-content: flex-start;\n    min-height: 280px;\n    position: relative;\n  }\n  .machine .mc .mc-star {\n    width: 36px; height: 36px;\n    color: var(--accent);\n    align-self: center;\n    margin-bottom: 4px;\n  }\n  .machine .mc .mc-t {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 40px;\n    line-height: 1;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .machine .mc .mc-d {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n    margin-top: auto;\n  }\n  .machine .mc::after {\n    content: '\u2192';\n    position: absolute;\n    right: -16px;\n    top: 50%;\n    transform: translateY(-50%);\n    font-family: var(--mono);\n    font-size: 24px;\n    color: #ffffff;\n    background: #050505;\n    padding: 0 4px;\n    z-index: 2;\n  }\n  .machine .mc:last-child::after { display: none; }\n\n  /* Big quote \u2014 slide 14, 17 */\n  .big-quote {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 196px;\n    line-height: 0.95;\n    letter-spacing: -0.025em;\n    color: #ffffff;\n    margin: 0;\n    text-wrap: balance;\n    text-shadow:\n      4px 4px 0 oklch(0.90 0.19 96 / 0.45),\n      0 6px 22px rgba(0,0,0,0.55);\n  }\n  .quote-mark {\n    font-family: \"Cormorant Garamond\", Georgia, serif;\n    font-style: italic;\n    font-weight: 600;\n    font-size: 240px;\n    line-height: 0.5;\n    color: var(--accent);\n    opacity: 0.18;\n    user-select: none;\n    pointer-events: none;\n    margin-bottom: 0;\n  }\n\n  /* Garbage-in card */\n  .gigo {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 60px;\n    width: 100%;\n    align-items: center;\n  }\n  .gigo-quote {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: italic;\n    font-size: 120px;\n    line-height: 0.95;\n    letter-spacing: -0.02em;\n    color: #ffffff;\n    text-transform: uppercase;\n    text-wrap: balance;\n  }\n  .gigo-quote em {\n    color: var(--accent);\n    font-style: italic;\n  }\n  .gigo-body {\n    display: flex;\n    flex-direction: column;\n    gap: 22px;\n  }\n  .gigo-body .gg-lede {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 28px;\n    line-height: 1.4;\n    color: var(--ink-dim);\n  }\n  .gigo-body ul {\n    margin: 0; padding: 0; list-style: none;\n    display: flex; flex-direction: column; gap: 14px;\n  }\n  .gigo-body ul li {\n    font-family: var(--display);\n    font-weight: 700;\n    font-size: 28px;\n    line-height: 1.35;\n    color: #ffffff;\n    padding-left: 28px;\n    position: relative;\n  }\n  .gigo-body ul li::before {\n    content: '\u2726';\n    position: absolute;\n    left: 0; top: 2px;\n    color: #ffffff;\n    font-size: 24px;\n  }\n\n  /* Homework checklist \u2014 slide 19 */\n  .hw-list {\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    margin: 0; padding: 0; list-style: none;\n    width: 100%;\n    max-width: 1400px;\n  }\n  .hw-list li {\n    display: flex;\n    align-items: flex-start;\n    gap: 28px;\n    padding: 26px 32px;\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n  }\n  .hw-list .hw-n {\n    font-family: var(--mono);\n    font-size: 28px;\n    font-weight: 700;\n    letter-spacing: 0.32em;\n    color: #ffffff;\n    min-width: 56px;\n    flex-shrink: 0;\n    margin-top: 4px;\n  }\n  .hw-list .hw-box {\n    width: 38px; height: 38px;\n    border: 2px solid #050505;\n    background: #ffffff;\n    border-radius: 4px;\n    flex-shrink: 0;\n    margin-top: 4px;\n  }\n  .hw-list .hw-text {\n    font-family: var(--display);\n    font-weight: 600;\n    font-size: 28px;\n    line-height: 1.35;\n    color: #ffffff;\n  }\n  .hw-list .hw-text b {\n    color: var(--accent);\n    font-weight: 700;\n  }\n\n  /* Week 2 schedule cards \u2014 like cal-grid but with day labels */\n  .w2-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 28px;\n    width: 100%;\n  }\n  .w2-card {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 40px 36px;\n    display: flex;\n    flex-direction: column;\n    gap: 18px;\n    min-height: 460px;\n  }\n  .w2-card .w2-dow {\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 600;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .w2-card .w2-name {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 64px;\n    line-height: 1;\n    letter-spacing: -0.005em;\n    text-transform: uppercase;\n    color: #ffffff;\n  }\n  .w2-card .w2-body {\n    font-family: var(--display);\n    font-weight: 500;\n    font-size: 24px;\n    line-height: 1.45;\n    color: var(--ink-dim);\n    margin-top: 6px;\n    text-wrap: pretty;\n  }\n\n  /* 5-week roadmap \u2014 slide 18 */\n  .weeks {\n    display: flex;\n    flex-direction: column;\n    width: 100%;\n    border-top: 1px solid var(--rule);\n  } 10;\n    padding: 0 120px;\n    text-align: center;\n  }\n  .cc2-tag {\n    font-family: var(--mono);\n    font-size: 26px;\n    font-weight: 600;\n    letter-spacing: 0.52em;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .cc2-title {\n    font-family: var(--hero);\n    font-weight: 900;\n    font-style: normal;\n    font-size: 320px;\n    line-height: 0.88;\n    letter-spacing: -0.025em;\n    text-transform: uppercase;\n    color: #ffffff;\n    margin: 0;\n    text-shadow:\n      4px 4px 0 #1c1c1c,\n      10px 10px 0 #121212,\n      18px 18px 0 #080808,\n      0 6px 30px rgba(0,0,0,0.6);\n  }\n  .cc2-sub {\n    font-family: var(--display);\n    font-weight: 500;\n    font-style: normal;\n    font-size: 36px;\n    letter-spacing: 0.005em;\n    color: #ffffff;\n    margin-top: 16px;\n    max-width: 1300px;\n    text-wrap: balance;\n  }\n  .cc2-foot {\n    position: absolute;\n    bottom: 80px;\n    left: 0; right: 0;\n    z-index: 10;\n    display: flex;\n    justify-content: center;\n    gap: 24px;\n    font-family: var(--mono);\n    font-size: 26px;\n    font-weight: 500;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n  .cc2-foot span.sep { color: var(--accent); }\n  /* Simple clickable URL \u2014 slide 03 */\n  .site-link {\n    display: inline-flex;\n    align-items: center;\n    gap: 22px;\n    font-family: var(--hero);\n    font-weight: 900;\n    font-size: 96px;\n    line-height: 1;\n    letter-spacing: -0.01em;\n    color: oklch(0.90 0.19 96);\n    text-decoration: underline;\n    text-decoration-thickness: 4px;\n    text-underline-offset: 16px;\n    text-transform: lowercase;\n    align-self: flex-start;\n    transition: opacity .2s ease;\n  }\n  .site-link:hover { opacity: 0.85; }\n  .site-link svg {\n    width: 64px;\n    height: 64px;\n    display: block;\n    flex-shrink: 0;\n  }\n\n  /* Browser-window-style live site preview (slide 03) */\n  .site-preview {\n    display: flex;\n    flex-direction: column;\n    width: 100%;\n    height: 460px;\n    border: 1px solid var(--rule);\n    background: #0a0a0a;\n    overflow: hidden;\n    text-decoration: none;\n    color: inherit;\n    transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;\n    position: relative;\n    box-shadow: 0 30px 80px rgba(0,0,0,0.5);\n  }\n  .site-preview:hover {\n    border-color: oklch(0.90 0.19 96 / 0.8);\n    transform: translateY(-3px);\n    box-shadow: 0 36px 90px rgba(0,0,0,0.65), 0 0 0 1px oklch(0.90 0.19 96 / 0.4);\n  }\n  .site-preview .sp-chrome {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    padding: 14px 22px;\n    background: #141414;\n    border-bottom: 1px solid var(--rule);\n    flex-shrink: 0;\n  }\n  .site-preview .sp-dots {\n    display: flex;\n    gap: 8px;\n  }\n  .site-preview .sp-dot {\n    width: 13px;\n    height: 13px;\n    border-radius: 50%;\n    background: #2a2a2a;\n  }\n  .site-preview .sp-url {\n    flex: 1;\n    padding: 9px 18px;\n    background: #050505;\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 500;\n    letter-spacing: 0.02em;\n    color: #ffffff;\n    text-align: center;\n    text-transform: lowercase;\n  }\n  .site-preview .sp-url b {\n    color: var(--accent);\n    font-weight: 500;\n  }\n  .site-preview .sp-open {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    padding: 8px 18px;\n    background: oklch(0.90 0.19 96);\n    color: #050505;\n    border-radius: 999px;\n    font-family: var(--mono);\n    font-size: 24px;\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    white-space: nowrap;\n    flex-shrink: 0;\n  }\n  .site-preview .sp-open svg {\n    width: 16px; height: 16px;\n    display: block;\n  }\n  /* Mocked site hero \u2014 stylized representation of the live site */\n  .site-preview .sp-body {\n    flex: 1;\n    position: relative;\n fy-content: center;\n    font-family: var(--mono);\n    font-size: 24px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n\n\n  /* ============================================================\n     CC3 additions: terminal, file tree, chip flow, pipeline\n     ============================================================ */\n\n  /* Terminal/code mock */\n  .term {\n    background: #050505;\n    border: 1px solid var(--rule);\n    border-radius: 6px;\n    overflow: hidden;\n    font-family: var(--mono);\n    font-size: 26px;\n    width: 100%;\n  }\n  .term .term-bar {\n    background: rgba(255,255,255,0.04);\n    border-bottom: 1px solid var(--rule);\n    padding: 18px 24px;\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    font-family: var(--mono);\n    font-size: 20px;\n    color: var(--ink-mute);\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n  }\n  .term .term-bar .tdot { width: 14px; height: 14px; border-radius: 50%; background: #3a3a3a; }\n  .term .term-bar .tdot.y { background: var(--accent); }\n  .term .term-bar .tlabel { margin-left: 14px; }\n  .term .term-body {\n    padding: 32px 30px;\n    line-height: 1.85;\n    color: #d8d6cf;\n    font-size: 26px;\n  }\n  .term .term-body .prompt { color: var(--accent); margin-right: 8px; }\n  .term .term-body .muted { color: var(--ink-mute); }\n  .term .term-body .ok { color: var(--accent); }\n  .term .term-body .injected {\n    display: block;\n    background: oklch(0.90 0.19 96 / 0.10);\n    border-left: 4px solid var(--accent);\n    padding: 14px 18px;\n    margin: 8px 0 14px;\n    border-radius: 0 4px 4px 0;\n    color: var(--accent);\n    font-weight: 600;\n  }\n\n  /* File tree */\n  .tree {\n    font-family: var(--mono);\n    font-size: 32px;\n    line-height: 2.1;\n    width: 100%;\n  }\n  .tree .ln {\n    display: flex;\n    align-items: center;\n    gap: 18px;\n    padding: 6px 0;\n  }\n  .tree .pipe { color: var(--ink-mute); }\n  .tree .folder { color: var(--accent); font-weight: 700; }\n  .tree .file { color: #ffffff; font-weight: 700; }\n  .tree .root { color: #ffffff; font-weight: 700; font-size: 36px; }\n  .tree .tag {\n    margin-left: auto;\n    font-family: var(--mono);\n    font-size: 20px;\n    letter-spacing: 0.18em;\n    color: var(--ink-mute);\n    background: rgba(255,255,255,0.03);\n    border: 1px solid var(--rule);\n    padding: 8px 18px;\n    border-radius: 3px;\n    text-transform: uppercase;\n  }\n\n  /* Chip flow */\n  .chip-flow {\n    display: flex;\n    align-items: center;\n    gap: 18px;\n    flex-wrap: wrap;\n    justify-content: center;\n  }\n  .chip {\n    font-family: var(--mono);\n    font-size: 24px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    padding: 18px 28px;\n    border: 1px solid var(--rule);\n    border-radius: 4px;\n    background: rgba(255,255,255,0.02);\n    color: #ffffff;\n    font-weight: 600;\n  }\n  .chip.accent {\n    border-color: var(--accent);\n    background: oklch(0.90 0.19 96 / 0.10);\n    color: var(--accent);\n  }\n  .chip-flow .chev {\n    font-family: var(--hero);\n    font-style: italic;\n    font-weight: 900;\n    font-size: 40px;\n    color: var(--accent);\n  }\n\n  /* Pipeline boxes */\n  .pipe-row {\n    display: grid;\n    grid-template-columns: 1fr 60px 1.1fr 60px 1fr;\n    align-items: stretch;\n    gap: 24px;\n    width: 100%;\n  }\n  .pipe-box {\n    border: 1px solid var(--rule);\n    background: rgba(255,255,255,0.02);\n    padding: 40px 32px;\n    border-radius: 4px;\n    display: flex;\n    flex-direction: column;\n    gap: 16px;\n    text-align: center;\n    align-items: center;\n    justify-content: center;\n  }\n  .pipe-box.engine {\n    background: var(--accent);\n    border-color: var(--accent);\n    color: #050505;\n  }\n  .pipe-box .pb-label {\n    font-family: var(--mono);\n    font-size: 22px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--ink-mute);\n  }\n  .p
